<!-- 흙속의 병아리(엔드리스 러너) — Web Audio 사운드 + 파워업(자석/실드) + 콤보 + 최고기록 고도화판. 단일 HTML, 캔버스 기반 -->
<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>🐣 흙속의 병아리 - Dirt Runner</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #2a1a0a;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      overflow: hidden;
      touch-action: none;
      -webkit-user-select: none;
      user-select: none;
    }
    canvas {
      display: block;
      image-rendering: pixelated;
    }
    #snd {
      position: fixed; top: 12px; right: 12px; z-index: 10;
      width: 42px; height: 42px; border-radius: 50%; border: none;
      background: rgba(0,0,0,0.45); color: #fff; font-size: 20px; cursor: pointer;
    }
  </style>
</head>
<body>
  <canvas id="gameCanvas"></canvas>
  <button id="snd">🔊</button>
  <script>
  // ============================================================
  // 🐥 흙속의 병아리 (Dirt Chick Runner) — 고도화판
  // Super Penguins inspired endless runner
  // 추가: WebAudio 사운드/BGM, 파워업(자석/실드), 콤보, 근접회피, 최고기록 저장
  // ============================================================

  const canvas = document.getElementById('gameCanvas');
  const ctx = canvas.getContext('2d');

  // --- Canvas Sizing ---
  const GAME_WIDTH = 800;
  const GAME_HEIGHT = 450;
  const GROUND_Y = 340;

  function resizeCanvas() {
    const ratio = GAME_WIDTH / GAME_HEIGHT;
    let w = window.innerWidth;
    let h = window.innerHeight;
    if (w / h > ratio) {
      w = h * ratio;
    } else {
      h = w / ratio;
    }
    canvas.width = GAME_WIDTH;
    canvas.height = GAME_HEIGHT;
    canvas.style.width = w + 'px';
    canvas.style.height = h + 'px';
  }
  window.addEventListener('resize', resizeCanvas);
  resizeCanvas();

  // --- Constants ---
  const GRAVITY = 0.6;
  const JUMP_FORCE = -12;
  const INITIAL_SPEED = 4;
  const MAX_SPEED = 10;
  const SPEED_INCREMENT = 0.0003;
  const PLAYER_X = 100;
  const COMBO_WINDOW = 150;   // 콤보 유지 프레임(~2.5s) — 지나면 콤보 데케이
  const MAGNET_TIME = 420;    // 자석 지속 프레임(~7s)
  const SHIELD_TIME = 720;    // 실드 최대 지속(~12s, 또는 1회 피격 시 소모)
  const HS_KEY = 'dirtrunner_highscore_v1';

  // --- Game State ---
  const STATE = { MENU: 0, PLAYING: 1, GAMEOVER: 2 };
  let gameState = STATE.MENU;
  let gameSpeed = INITIAL_SPEED;
  let distance = 0;
  let score = 0;
  let highScore = 0;
  let frameCount = 0;
  let dustParticles = [];
  let collectEffects = [];
  let screenShake = 0;
  let comboCount = 0;
  let comboTimer = 0;
  let isNewRecord = false;
  let soundOn = true;

  try { highScore = parseInt(localStorage.getItem(HS_KEY), 10) || 0; } catch (e) { highScore = 0; }

  // --- Color Palette ---
  const COLORS = {
    skyTop: '#87CEEB',
    skyBottom: '#E0F0FF',
    sun: '#FFE066',
    sunGlow: 'rgba(255,224,102,0.3)',
    cloud: 'rgba(255,255,255,0.9)',
    cloudShadow: 'rgba(200,210,230,0.7)',
    groundTop: '#8B6914',
    groundMid: '#6B4E0A',
    groundBottom: '#4A3506',
    grass: '#5DA832',
    grassDark: '#4A8A28',
    dirtDot: '#7A5C10',
    chick: { body: '#FFE14D', bodyDark: '#F5D030', beak: '#FF8C00', feet: '#FF6B35', eye: '#2D1B00', cheek: 'rgba(255,150,100,0.5)' },
    rock: '#8A8A8A',
    rockDark: '#6A6A6A',
    rockLight: '#A0A0A0',
    branch: '#6B3A1F',
    branchLight: '#8B5A3A',
    worm: '#E88FBF',
    wormDark: '#D070A0',
    wormLight: '#FFB0D8',
    magnet: '#E8443A',
    magnetTip: '#DDDDDD',
    shield: '#5BB8FF',
    ui: { bg: 'rgba(0,0,0,0.5)', text: '#FFFFFF', accent: '#FFE14D', score: '#FFD700' }
  };

  // ============================================================
  // SOUND — WebAudio 합성 SFX + 간이 BGM (에셋 없음)
  // ============================================================

  let ac = null;
  function audio() {
    if (!ac) { try { ac = new (window.AudioContext || window.webkitAudioContext)(); } catch (e) {} }
    if (ac && ac.state === 'suspended') ac.resume();
    return ac;
  }
  function tone(freq, dur, type, vol, delay) {
    if (!soundOn) return;
    const a = audio(); if (!a) return;
    type = type || 'sine'; vol = vol == null ? 0.12 : vol; delay = delay || 0;
    const t = a.currentTime + delay;
    const o = a.createOscillator(), g = a.createGain();
    o.type = type; o.frequency.setValueAtTime(freq, t);
    o.connect(g); g.connect(a.destination);
    g.gain.setValueAtTime(vol, t);
    g.gain.exponentialRampToValueAtTime(0.0008, t + dur);
    o.start(t); o.stop(t + dur);
  }
  function sweep(f1, f2, dur, type, vol) {
    if (!soundOn) return;
    const a = audio(); if (!a) return;
    const t = a.currentTime;
    const o = a.createOscillator(), g = a.createGain();
    o.type = type || 'sine';
    o.frequency.setValueAtTime(f1, t);
    o.frequency.exponentialRampToValueAtTime(f2, t + dur);
    o.connect(g); g.connect(a.destination);
    g.gain.setValueAtTime(vol == null ? 0.12 : vol, t);
    g.gain.exponentialRampToValueAtTime(0.0008, t + dur);
    o.start(t); o.stop(t + dur);
  }
  function noiseBurst(dur, vol) {
    if (!soundOn) return;
    const a = audio(); if (!a) return;
    const len = Math.floor(a.sampleRate * dur);
    const buf = a.createBuffer(1, len, a.sampleRate);
    const data = buf.getChannelData(0);
    for (let i = 0; i < len; i++) data[i] = (Math.random() * 2 - 1) * (1 - i / len);
    const src = a.createBufferSource(); src.buffer = buf;
    const g = a.createGain(); g.gain.value = vol == null ? 0.2 : vol;
    src.connect(g); g.connect(a.destination);
    src.start();
  }
  const sndJump = () => sweep(360, 720, 0.18, 'sine', 0.10);
  const sndSlide = () => noiseBurst(0.18, 0.10);
  const sndCollect = (c) => { tone(660 + Math.min(c, 6) * 70, 0.10, 'triangle', 0.12); tone(990 + Math.min(c, 6) * 90, 0.08, 'sine', 0.06, 0.02); };
  const sndPower = () => [0, 1, 2, 3].forEach(i => tone(523 * (1 + i * 0.25), 0.12, 'square', 0.08, i * 0.05));
  const sndShieldHit = () => { sweep(900, 200, 0.25, 'sine', 0.16); noiseBurst(0.12, 0.10); };
  const sndHit = () => { noiseBurst(0.3, 0.25); tone(140, 0.35, 'sawtooth', 0.16); };
  const sndNearMiss = () => tone(1200, 0.06, 'sine', 0.07);
  const sndRecord = () => [523, 659, 784, 1046, 1318].forEach((f, i) => tone(f, 0.16, 'triangle', 0.12, i * 0.09));

  // --- 간이 BGM 스텝 시퀀서 ---
  let bgmInterval = null, bgmStep = 0;
  const BGM_BASS = [131, 131, 165, 196];                 // C E G 베이스
  const BGM_ARP = [523, 659, 784, 659, 523, 784, 988, 784];
  function bgmTick() {
    if (!soundOn) return;
    // 베이스 (4스텝마다)
    if (bgmStep % 2 === 0) tone(BGM_BASS[(bgmStep / 2) % BGM_BASS.length], 0.18, 'triangle', 0.05);
    // 아르페지오 (속도 빠를수록 등장)
    if (gameSpeed > INITIAL_SPEED + 1.5) tone(BGM_ARP[bgmStep % BGM_ARP.length], 0.12, 'square', 0.035);
    // 고속 레이어
    if (gameSpeed > MAX_SPEED - 2.5) tone(BGM_ARP[bgmStep % BGM_ARP.length] * 2, 0.08, 'sine', 0.025, 0.06);
    bgmStep++;
  }
  function startBgm() {
    if (bgmInterval) return;
    bgmStep = 0;
    bgmInterval = setInterval(bgmTick, 200);
  }
  function stopBgm() {
    if (bgmInterval) { clearInterval(bgmInterval); bgmInterval = null; }
  }

  // ============================================================
  // BACKGROUND - Parallax layers
  // ============================================================

  class Cloud {
    constructor() { this.reset(true); }
    reset(initial) {
      this.x = initial ? Math.random() * GAME_WIDTH : GAME_WIDTH + Math.random() * 200;
      this.y = 30 + Math.random() * 100;
      this.width = 60 + Math.random() * 80;
      this.height = 25 + Math.random() * 20;
      this.speed = 0.2 + Math.random() * 0.3;
      this.opacity = 0.5 + Math.random() * 0.4;
    }
    update() {
      this.x -= this.speed * (gameSpeed / INITIAL_SPEED);
      if (this.x + this.width < -50) this.reset(false);
    }
    draw() {
      ctx.save();
      ctx.globalAlpha = this.opacity;
      ctx.fillStyle = COLORS.cloud;
      const cx = this.x + this.width / 2;
      const cy = this.y + this.height / 2;
      ctx.beginPath();
      ctx.ellipse(cx, cy, this.width / 2, this.height / 2, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.beginPath();
      ctx.ellipse(cx - this.width * 0.25, cy + 3, this.width * 0.3, this.height * 0.35, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.beginPath();
      ctx.ellipse(cx + this.width * 0.25, cy + 2, this.width * 0.25, this.height * 0.3, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();
    }
  }

  class BackgroundBush {
    constructor() { this.reset(true); }
    reset(initial) {
      this.x = initial ? Math.random() * GAME_WIDTH : GAME_WIDTH + Math.random() * 100;
      this.type = Math.random() > 0.5 ? 'bush' : 'flower';
      this.size = 0.6 + Math.random() * 0.6;
    }
    update() {
      this.x -= gameSpeed * 0.5;
      if (this.x < -50) this.reset(false);
    }
    draw() {
      ctx.save();
      if (this.type === 'bush') {
        const s = this.size;
        const bx = this.x;
        const by = GROUND_Y - 2;
        ctx.fillStyle = COLORS.grassDark;
        ctx.beginPath();
        ctx.ellipse(bx, by - 10 * s, 15 * s, 12 * s, 0, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = COLORS.grass;
        ctx.beginPath();
        ctx.ellipse(bx + 5 * s, by - 8 * s, 10 * s, 8 * s, 0, 0, Math.PI * 2);
        ctx.fill();
      } else {
        const s = this.size;
        const fx = this.x;
        const fy = GROUND_Y;
        ctx.strokeStyle = '#4A8A28';
        ctx.lineWidth = 2 * s;
        ctx.beginPath();
        ctx.moveTo(fx, fy);
        ctx.lineTo(fx, fy - 18 * s);
        ctx.stroke();
        const colors = ['#FF6B9D', '#FFB347', '#87CEEB', '#DDA0DD'];
        ctx.fillStyle = colors[Math.floor(this.x) % colors.length];
        for (let i = 0; i < 5; i++) {
          const angle = (i / 5) * Math.PI * 2 - Math.PI / 2;
          const px = fx + Math.cos(angle) * 5 * s;
          const py = fy - 18 * s + Math.sin(angle) * 5 * s;
          ctx.beginPath();
          ctx.ellipse(px, py, 4 * s, 3 * s, angle, 0, Math.PI * 2);
          ctx.fill();
        }
        ctx.fillStyle = '#FFE14D';
        ctx.beginPath();
        ctx.arc(fx, fy - 18 * s, 3 * s, 0, Math.PI * 2);
        ctx.fill();
      }
      ctx.restore();
    }
  }

  class DirtPattern {
    constructor() {
      this.dots = [];
      for (let i = 0; i < 30; i++) {
        this.dots.push({
          x: Math.random() * (GAME_WIDTH + 200),
          y: GROUND_Y + 8 + Math.random() * 80,
          size: 1 + Math.random() * 3,
          shade: Math.random() > 0.5 ? COLORS.dirtDot : COLORS.groundBottom
        });
      }
    }
    update() {
      for (let d of this.dots) {
        d.x -= gameSpeed;
        if (d.x < -10) {
          d.x = GAME_WIDTH + Math.random() * 50;
          d.y = GROUND_Y + 8 + Math.random() * 80;
        }
      }
    }
    draw() {
      for (let d of this.dots) {
        ctx.fillStyle = d.shade;
        ctx.beginPath();
        ctx.arc(d.x, d.y, d.size, 0, Math.PI * 2);
        ctx.fill();
      }
    }
  }

  let clouds = [];
  let bushes = [];
  let dirtPattern = null;
  let bgScrollX = 0;

  function initBackground() {
    clouds = [];
    bushes = [];
    for (let i = 0; i < 5; i++) clouds.push(new Cloud());
    for (let i = 0; i < 8; i++) bushes.push(new BackgroundBush());
    dirtPattern = new DirtPattern();
  }

  function updateBackground() {
    bgScrollX += gameSpeed;
    for (let c of clouds) c.update();
    for (let b of bushes) b.update();
    dirtPattern.update();
  }

  function drawBackground() {
    const skyGrad = ctx.createLinearGradient(0, 0, 0, GROUND_Y);
    skyGrad.addColorStop(0, COLORS.skyTop);
    skyGrad.addColorStop(1, COLORS.skyBottom);
    ctx.fillStyle = skyGrad;
    ctx.fillRect(0, 0, GAME_WIDTH, GROUND_Y);

    ctx.fillStyle = COLORS.sunGlow;
    ctx.beginPath();
    ctx.arc(650, 70, 50, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = COLORS.sun;
    ctx.beginPath();
    ctx.arc(650, 70, 28, 0, Math.PI * 2);
    ctx.fill();

    for (let c of clouds) c.draw();
    for (let b of bushes) b.draw();

    const groundGrad = ctx.createLinearGradient(0, GROUND_Y, 0, GAME_HEIGHT);
    groundGrad.addColorStop(0, COLORS.groundTop);
    groundGrad.addColorStop(0.1, COLORS.groundMid);
    groundGrad.addColorStop(1, COLORS.groundBottom);
    ctx.fillStyle = groundGrad;
    ctx.fillRect(0, GROUND_Y, GAME_WIDTH, GAME_HEIGHT - GROUND_Y);

    ctx.fillStyle = COLORS.grass;
    ctx.fillRect(0, GROUND_Y - 3, GAME_WIDTH, 6);
    for (let i = 0; i < GAME_WIDTH; i += 15) {
      const offset = (i + bgScrollX * 0.8) % GAME_WIDTH;
      const gx = (GAME_WIDTH - offset) % GAME_WIDTH;
      const h = 5 + Math.sin(i * 0.3) * 3;
      ctx.fillStyle = COLORS.grass;
      ctx.beginPath();
      ctx.moveTo(gx - 3, GROUND_Y);
      ctx.lineTo(gx, GROUND_Y - h);
      ctx.lineTo(gx + 3, GROUND_Y);
      ctx.fill();
    }

    dirtPattern.draw();

    ctx.strokeStyle = 'rgba(0,0,0,0.15)';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(0, GROUND_Y);
    ctx.lineTo(GAME_WIDTH, GROUND_Y);
    ctx.stroke();
  }

  // ============================================================
  // PLAYER - Chick
  // ============================================================

  class Player {
    constructor() {
      this.x = PLAYER_X;
      this.y = GROUND_Y;
      this.width = 30;
      this.height = 32;
      this.vy = 0;
      this.isJumping = false;
      this.isSliding = false;
      this.slideTimer = 0;
      this.runFrame = 0;
      this.runTimer = 0;
      this.blinkTimer = 0;
      this.isBlinking = false;
      this.alive = true;
      this.deathTimer = 0;
      this.jumpCount = 0;
      this.shield = false;
      this.shieldTimer = 0;
      this.magnetTimer = 0;
      this.invincible = 0;
    }

    get hasMagnet() { return this.magnetTimer > 0; }

    get hitbox() {
      if (this.isSliding) {
        return { x: this.x - 15, y: this.y - 12, w: 30, h: 12 };
      }
      return { x: this.x - 14, y: this.y - 32, w: 28, h: 32 };
    }

    jump() {
      if (!this.isJumping && !this.isSliding) {
        this.vy = JUMP_FORCE;
        this.isJumping = true;
        this.jumpCount++;
        spawnDust(this.x, this.y, 5);
        sndJump();
      }
    }

    slide() {
      if (!this.isJumping && !this.isSliding) {
        this.isSliding = true;
        this.slideTimer = 30;
        sndSlide();
      }
    }

    giveShield() { this.shield = true; this.shieldTimer = SHIELD_TIME; }
    giveMagnet() { this.magnetTimer = MAGNET_TIME; }

    // 피격 처리: 실드 있으면 흡수, 없으면 사망. 흡수했으면 true.
    onHit() {
      if (this.invincible > 0) return true;
      if (this.shield) {
        this.shield = false; this.shieldTimer = 0;
        this.invincible = 50;
        screenShake = 8;
        sndShieldHit();
        spawnDust(this.x, this.y, 10);
        comboCount = 0;
        return true;
      }
      this.die();
      return false;
    }

    die() {
      if (this.alive) {
        this.alive = false;
        this.deathTimer = 0;
        screenShake = 15;
        spawnDust(this.x, this.y, 15);
        sndHit();
        stopBgm();
      }
    }

    update() {
      if (!this.alive) {
        this.deathTimer++;
        if (this.deathTimer > 60) {
          gameState = STATE.GAMEOVER;
          finalizeRun();
        }
        return;
      }

      if (this.invincible > 0) this.invincible--;
      if (this.shieldTimer > 0) { this.shieldTimer--; if (this.shieldTimer === 0) this.shield = false; }
      if (this.magnetTimer > 0) this.magnetTimer--;

      if (this.isJumping) {
        this.vy += GRAVITY;
        this.y += this.vy;
        if (this.y >= GROUND_Y) {
          this.y = GROUND_Y;
          this.isJumping = false;
          this.vy = 0;
          spawnDust(this.x, this.y, 3);
        }
      }

      if (this.isSliding) {
        this.slideTimer--;
        if (this.slideTimer <= 0) this.isSliding = false;
      }

      this.runTimer++;
      if (this.runTimer > 5) {
        this.runTimer = 0;
        this.runFrame = (this.runFrame + 1) % 4;
      }

      this.blinkTimer++;
      if (!this.isBlinking && this.blinkTimer > 100 + Math.random() * 80) {
        this.isBlinking = true; this.blinkTimer = 0;
      }
      if (this.isBlinking && this.blinkTimer > 8) {
        this.isBlinking = false; this.blinkTimer = 0;
      }

      if (!this.isJumping && frameCount % 8 === 0) spawnDust(this.x - 8, this.y, 1);
    }

    draw() {
      ctx.save();
      const px = this.x;
      const py = this.y;

      if (!this.alive) {
        const t = this.deathTimer / 60;
        ctx.globalAlpha = 1 - t;
        ctx.translate(px, py - 16);
        ctx.rotate(t * Math.PI * 4);
        ctx.translate(-px, -(py - 16));
      } else if (this.invincible > 0 && Math.floor(this.invincible / 4) % 2 === 0) {
        ctx.globalAlpha = 0.5;
      }

      if (this.isSliding) this.drawSliding(px, py);
      else this.drawRunning(px, py);

      ctx.restore();

      // 자석 오라
      if (this.hasMagnet && this.alive) {
        ctx.save();
        ctx.globalAlpha = 0.18 + Math.sin(frameCount * 0.2) * 0.07;
        ctx.strokeStyle = COLORS.magnet;
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.arc(px, py - 16, 60, 0, Math.PI * 2);
        ctx.stroke();
        ctx.restore();
      }

      // 실드 버블
      if (this.shield && this.alive) {
        ctx.save();
        const r = 26 + Math.sin(frameCount * 0.15) * 2;
        ctx.globalAlpha = 0.35 + Math.sin(frameCount * 0.15) * 0.1;
        ctx.strokeStyle = COLORS.shield;
        ctx.lineWidth = 3;
        ctx.beginPath();
        ctx.arc(px, py - 14, r, 0, Math.PI * 2);
        ctx.stroke();
        ctx.globalAlpha = 0.12;
        ctx.fillStyle = COLORS.shield;
        ctx.beginPath();
        ctx.arc(px, py - 14, r, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
      }
    }

    drawRunning(px, py) {
      const legOffset = this.isJumping ? 3 : Math.sin(this.runFrame * Math.PI / 2) * 5;
      const bodyBob = this.isJumping ? 0 : Math.abs(Math.sin(this.runFrame * Math.PI / 2)) * 2;

      ctx.fillStyle = 'rgba(0,0,0,0.15)';
      ctx.beginPath();
      ctx.ellipse(px, py + 1, 16, 4, 0, 0, Math.PI * 2);
      ctx.fill();

      const footColor = COLORS.chick.feet;
      ctx.fillStyle = footColor;
      ctx.beginPath();
      ctx.ellipse(px - 5 + legOffset * 0.3, py - 2, 6, 3, -0.2, 0, Math.PI * 2);
      ctx.fill();
      ctx.beginPath();
      ctx.ellipse(px + 5 - legOffset * 0.3, py - 2, 6, 3, 0.2, 0, Math.PI * 2);
      ctx.fill();

      const by = py - 18 - bodyBob;
      ctx.fillStyle = COLORS.chick.body;
      ctx.beginPath();
      ctx.ellipse(px, by, 14, 16, 0, 0, Math.PI * 2);
      ctx.fill();

      ctx.fillStyle = COLORS.chick.bodyDark;
      ctx.beginPath();
      ctx.ellipse(px + 2, by + 5, 10, 8, 0, 0, Math.PI * 2);
      ctx.fill();

      const wingFlap = this.isJumping ? -3 : Math.sin(this.runFrame * Math.PI / 2) * 4;
      ctx.fillStyle = COLORS.chick.bodyDark;
      ctx.beginPath();
      ctx.ellipse(px - 12, by - 2 + wingFlap, 5, 8, -0.4, 0, Math.PI * 2);
      ctx.fill();
      ctx.beginPath();
      ctx.ellipse(px + 12, by - 2 - wingFlap, 5, 8, 0.4, 0, Math.PI * 2);
      ctx.fill();

      ctx.fillStyle = COLORS.chick.cheek;
      ctx.beginPath();
      ctx.ellipse(px - 10, by + 3, 4, 3, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.beginPath();
      ctx.ellipse(px + 10, by + 3, 4, 3, 0, 0, Math.PI * 2);
      ctx.fill();

      const eyeY = by - 4;
      ctx.fillStyle = '#FFFFFF';
      ctx.beginPath();
      ctx.ellipse(px - 6, eyeY, 5, 5, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.beginPath();
      ctx.ellipse(px + 6, eyeY, 5, 5, 0, 0, Math.PI * 2);
      ctx.fill();

      if (this.isBlinking) {
        ctx.strokeStyle = COLORS.chick.eye;
        ctx.lineWidth = 1.5;
        ctx.beginPath();
        ctx.moveTo(px - 9, eyeY); ctx.lineTo(px - 3, eyeY); ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(px + 3, eyeY); ctx.lineTo(px + 9, eyeY); ctx.stroke();
      } else {
        ctx.fillStyle = COLORS.chick.eye;
        ctx.beginPath(); ctx.arc(px - 5, eyeY + 1, 2.5, 0, Math.PI * 2); ctx.fill();
        ctx.beginPath(); ctx.arc(px + 5, eyeY + 1, 2.5, 0, Math.PI * 2); ctx.fill();
        ctx.fillStyle = '#FFFFFF';
        ctx.beginPath(); ctx.arc(px - 4, eyeY, 1, 0, Math.PI * 2); ctx.fill();
        ctx.beginPath(); ctx.arc(px + 6, eyeY, 1, 0, Math.PI * 2); ctx.fill();
      }

      ctx.fillStyle = COLORS.chick.beak;
      ctx.beginPath();
      ctx.moveTo(px - 3, by + 1);
      ctx.lineTo(px, by + 7);
      ctx.lineTo(px + 3, by + 1);
      ctx.closePath();
      ctx.fill();

      ctx.fillStyle = COLORS.chick.body;
      ctx.beginPath();
      ctx.ellipse(px - 2, by - 16, 3, 5, -0.3, 0, Math.PI * 2);
      ctx.fill();
      ctx.beginPath();
      ctx.ellipse(px + 2, by - 17, 2, 4, 0.3, 0, Math.PI * 2);
      ctx.fill();
    }

    drawSliding(px, py) {
      ctx.fillStyle = 'rgba(0,0,0,0.15)';
      ctx.beginPath();
      ctx.ellipse(px, py + 1, 18, 5, 0, 0, Math.PI * 2);
      ctx.fill();

      ctx.fillStyle = COLORS.chick.body;
      ctx.beginPath();
      ctx.ellipse(px, py - 8, 18, 8, 0, 0, Math.PI * 2);
      ctx.fill();

      ctx.fillStyle = COLORS.chick.bodyDark;
      ctx.beginPath();
      ctx.ellipse(px + 3, py - 5, 12, 5, 0, 0, Math.PI * 2);
      ctx.fill();

      ctx.fillStyle = '#FFFFFF';
      ctx.beginPath();
      ctx.ellipse(px + 10, py - 12, 4, 4, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = COLORS.chick.eye;
      ctx.beginPath();
      ctx.arc(px + 11, py - 11, 2, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#FFFFFF';
      ctx.beginPath();
      ctx.arc(px + 12, py - 12, 0.8, 0, Math.PI * 2);
      ctx.fill();

      ctx.fillStyle = COLORS.chick.beak;
      ctx.beginPath();
      ctx.moveTo(px + 14, py - 10);
      ctx.lineTo(px + 20, py - 8);
      ctx.lineTo(px + 14, py - 7);
      ctx.closePath();
      ctx.fill();

      ctx.fillStyle = COLORS.chick.feet;
      ctx.beginPath();
      ctx.ellipse(px - 12, py - 3, 5, 2, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.beginPath();
      ctx.ellipse(px - 6, py - 3, 5, 2, 0, 0, Math.PI * 2);
      ctx.fill();

      ctx.strokeStyle = 'rgba(255,255,255,0.4)';
      ctx.lineWidth = 1;
      for (let i = 0; i < 3; i++) {
        const ly = py - 6 + i * 4;
        const lx = px - 25 - i * 5;
        ctx.beginPath();
        ctx.moveTo(lx, ly);
        ctx.lineTo(lx - 15, ly);
        ctx.stroke();
      }
    }
  }

  // ============================================================
  // OBSTACLES
  // ============================================================

  class Obstacle {
    constructor(x, type) {
      this.x = x;
      this.type = type; // 'rock' or 'branch'
      this.passed = false;
      this.scored = false;
      if (this.type === 'rock') {
        this.width = 30; this.height = 28; this.y = GROUND_Y - this.height;
      } else {
        this.width = 45; this.height = 16; this.y = GROUND_Y - 42;
      }
    }

    get hitbox() {
      const pad = 5;
      if (this.type === 'rock') {
        return { x: this.x - this.width / 2 + pad, y: this.y + pad, w: this.width - pad * 2, h: this.height - pad };
      }
      return { x: this.x - this.width / 2 + pad, y: this.y + pad, w: this.width - pad * 2, h: this.height - pad * 2 };
    }

    update() { this.x -= gameSpeed; }

    draw() { if (this.type === 'rock') this.drawRock(); else this.drawBranch(); }

    drawRock() {
      const rx = this.x, ry = this.y, rw = this.width, rh = this.height;
      ctx.fillStyle = 'rgba(0,0,0,0.1)';
      ctx.beginPath();
      ctx.ellipse(rx, GROUND_Y + 1, rw / 2 + 3, 4, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = COLORS.rock;
      ctx.beginPath();
      ctx.moveTo(rx - rw / 2, GROUND_Y);
      ctx.lineTo(rx - rw / 2 + 3, ry + rh * 0.3);
      ctx.quadraticCurveTo(rx - rw / 4, ry, rx, ry - 3);
      ctx.quadraticCurveTo(rx + rw / 4, ry, rx + rw / 2 - 2, ry + rh * 0.35);
      ctx.lineTo(rx + rw / 2, GROUND_Y);
      ctx.closePath();
      ctx.fill();
      ctx.fillStyle = COLORS.rockLight;
      ctx.beginPath();
      ctx.ellipse(rx - 3, ry + 6, 5, 4, -0.3, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = COLORS.rockDark;
      ctx.beginPath();
      ctx.ellipse(rx + 5, ry + 10, 4, 3, 0.3, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = COLORS.rock;
      ctx.beginPath();
      ctx.arc(rx + rw / 2 + 8, GROUND_Y - 3, 4, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = COLORS.rockDark;
      ctx.beginPath();
      ctx.arc(rx + rw / 2 + 14, GROUND_Y - 2, 3, 0, Math.PI * 2);
      ctx.fill();
    }

    drawBranch() {
      const bx = this.x, by = this.y, bw = this.width, bh = this.height;
      ctx.strokeStyle = COLORS.branch;
      ctx.lineWidth = 4;
      ctx.beginPath();
      ctx.moveTo(bx - bw / 2 + 2, by + bh);
      ctx.lineTo(bx - bw / 2 + 2, GROUND_Y);
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(bx + bw / 2 - 2, by + bh);
      ctx.lineTo(bx + bw / 2 - 2, GROUND_Y);
      ctx.stroke();
      ctx.fillStyle = COLORS.branch;
      ctx.beginPath();
      ctx.roundRect(bx - bw / 2, by, bw, bh, 4);
      ctx.fill();
      ctx.fillStyle = COLORS.branchLight;
      ctx.fillRect(bx - bw / 2 + 3, by + 2, bw - 6, 3);
      ctx.fillStyle = '#5DA832';
      ctx.beginPath();
      ctx.ellipse(bx - 5, by - 2, 6, 4, -0.5, 0, Math.PI * 2);
      ctx.fill();
      ctx.beginPath();
      ctx.ellipse(bx + 8, by - 1, 5, 3, 0.5, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = 'rgba(255,100,100,0.6)';
      ctx.font = '12px sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText('⚠', bx, by - 8);
    }
  }

  let obstacles = [];

  function spawnObstacle() {
    const minGap = 200 - Math.min(distance / 100, 80);
    if (obstacles.length === 0 || (GAME_WIDTH - obstacles[obstacles.length - 1].x) > minGap + Math.random() * 150) {
      const type = Math.random() > 0.5 ? 'rock' : 'branch';
      obstacles.push(new Obstacle(GAME_WIDTH + 50, type));
    }
  }

  // ============================================================
  // COLLECTIBLES (worms)
  // ============================================================

  class Collectible {
    constructor(x, y) {
      this.x = x; this.y = y;
      this.width = 18; this.height = 14;
      this.collected = false;
      this.bobOffset = Math.random() * Math.PI * 2;
      this.sparkleTimer = 0;
    }
    get hitbox() {
      return { x: this.x - this.width / 2, y: this.y - this.height / 2, w: this.width, h: this.height };
    }
    update() {
      this.x -= gameSpeed;
      this.bobOffset += 0.08;
      this.sparkleTimer++;
      // 자석: 플레이어 쪽으로 끌려옴
      if (player && player.hasMagnet && player.alive) {
        const dx = player.x - this.x, dy = (player.y - 16) - this.y;
        const dist = Math.hypot(dx, dy);
        if (dist < 150) {
          this.x += (dx / dist) * 6;
          this.y += (dy / dist) * 6;
        }
      }
    }
    draw() {
      if (this.collected) return;
      const bx = this.x;
      const by = this.y + Math.sin(this.bobOffset) * 3;
      ctx.fillStyle = 'rgba(255,180,220,0.3)';
      ctx.beginPath(); ctx.arc(bx, by, 12, 0, Math.PI * 2); ctx.fill();
      const wiggle = Math.sin(this.bobOffset * 2) * 3;
      ctx.strokeStyle = COLORS.worm;
      ctx.lineWidth = 5; ctx.lineCap = 'round';
      ctx.beginPath();
      ctx.moveTo(bx - 8, by + 2);
      ctx.quadraticCurveTo(bx - 2, by + wiggle, bx + 4, by);
      ctx.stroke();
      ctx.fillStyle = COLORS.worm;
      ctx.beginPath(); ctx.arc(bx + 6, by - 1, 4, 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = COLORS.wormLight;
      ctx.beginPath(); ctx.arc(bx + 5, by - 2, 1.5, 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = '#2D1B00';
      ctx.beginPath(); ctx.arc(bx + 8, by - 2, 1, 0, Math.PI * 2); ctx.fill();
      if (this.sparkleTimer % 30 < 5) {
        ctx.fillStyle = 'rgba(255,255,200,0.8)';
        drawStar(bx + 10, by - 6, 3, 2, 4);
      }
    }
  }

  let collectibles = [];

  function spawnCollectible() {
    const minGap = 120;
    if (collectibles.length === 0 || (GAME_WIDTH - collectibles[collectibles.length - 1].x) > minGap + Math.random() * 100) {
      const y = GROUND_Y - 15 - Math.random() * 40;
      collectibles.push(new Collectible(GAME_WIDTH + 50, y));
    }
  }

  function drawStar(cx, cy, outerR, innerR, points) {
    ctx.beginPath();
    for (let i = 0; i < points * 2; i++) {
      const r = i % 2 === 0 ? outerR : innerR;
      const angle = (i * Math.PI) / points - Math.PI / 2;
      const x = cx + Math.cos(angle) * r;
      const y = cy + Math.sin(angle) * r;
      if (i === 0) ctx.moveTo(x, y);
      else ctx.lineTo(x, y);
    }
    ctx.closePath();
    ctx.fill();
  }

  // ============================================================
  // POWER-UPS (자석 / 실드)
  // ============================================================

  class PowerUp {
    constructor(x, y, type) {
      this.x = x; this.y = y;
      this.type = type; // 'magnet' | 'shield'
      this.r = 14;
      this.collected = false;
      this.bob = Math.random() * Math.PI * 2;
    }
    get hitbox() { return { x: this.x - this.r, y: this.y - this.r, w: this.r * 2, h: this.r * 2 }; }
    update() { this.x -= gameSpeed; this.bob += 0.1; }
    draw() {
      if (this.collected) return;
      const bx = this.x, by = this.y + Math.sin(this.bob) * 4;
      // 글로우 캡슐
      ctx.save();
      ctx.globalAlpha = 0.25 + Math.sin(this.bob) * 0.1;
      ctx.fillStyle = this.type === 'magnet' ? COLORS.magnet : COLORS.shield;
      ctx.beginPath(); ctx.arc(bx, by, this.r + 6, 0, Math.PI * 2); ctx.fill();
      ctx.restore();
      ctx.fillStyle = '#FFFFFF';
      ctx.beginPath(); ctx.arc(bx, by, this.r, 0, Math.PI * 2); ctx.fill();
      if (this.type === 'magnet') {
        // U자 자석
        ctx.strokeStyle = COLORS.magnet; ctx.lineWidth = 5; ctx.lineCap = 'butt';
        ctx.beginPath();
        ctx.arc(bx, by + 1, 7, Math.PI, Math.PI * 2, false);
        ctx.stroke();
        ctx.beginPath(); ctx.moveTo(bx - 7, by + 1); ctx.lineTo(bx - 7, by + 7); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(bx + 7, by + 1); ctx.lineTo(bx + 7, by + 7); ctx.stroke();
        ctx.strokeStyle = COLORS.magnetTip; ctx.lineWidth = 5;
        ctx.beginPath(); ctx.moveTo(bx - 7, by + 6); ctx.lineTo(bx - 7, by + 9); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(bx + 7, by + 6); ctx.lineTo(bx + 7, by + 9); ctx.stroke();
      } else {
        // 방패
        ctx.fillStyle = COLORS.shield;
        ctx.beginPath();
        ctx.moveTo(bx, by - 8);
        ctx.lineTo(bx + 7, by - 4);
        ctx.lineTo(bx + 7, by + 3);
        ctx.quadraticCurveTo(bx, by + 9, bx - 7, by + 3);
        ctx.lineTo(bx - 7, by - 4);
        ctx.closePath();
        ctx.fill();
        ctx.strokeStyle = '#FFFFFF'; ctx.lineWidth = 2;
        ctx.beginPath(); ctx.moveTo(bx - 3, by); ctx.lineTo(bx - 1, by + 3); ctx.lineTo(bx + 4, by - 3); ctx.stroke();
      }
    }
  }

  let powerups = [];

  function spawnPowerUp() {
    const y = GROUND_Y - 30 - Math.random() * 50;
    const type = Math.random() < 0.5 ? 'magnet' : 'shield';
    powerups.push(new PowerUp(GAME_WIDTH + 50, y, type));
  }

  // ============================================================
  // PARTICLES
  // ============================================================

  class DustParticle {
    constructor(x, y, vx, vy) {
      this.x = x; this.y = y; this.vx = vx; this.vy = vy;
      this.life = 1; this.decay = 0.02 + Math.random() * 0.03;
      this.size = 2 + Math.random() * 3;
    }
    update() { this.x += this.vx; this.y += this.vy; this.vy += 0.05; this.life -= this.decay; }
    draw() {
      ctx.save();
      ctx.globalAlpha = this.life * 0.6;
      ctx.fillStyle = '#C4A55A';
      ctx.beginPath(); ctx.arc(this.x, this.y, this.size * this.life, 0, Math.PI * 2); ctx.fill();
      ctx.restore();
    }
  }

  function spawnDust(x, y, count) {
    for (let i = 0; i < count; i++) {
      dustParticles.push(new DustParticle(
        x + (Math.random() - 0.5) * 10,
        y - Math.random() * 5,
        -Math.random() * 2 - 0.5,
        -Math.random() * 2
      ));
    }
  }

  class CollectEffect {
    constructor(x, y, text, color) {
      this.x = x; this.y = y; this.life = 1;
      this.text = text || '+10';
      this.color = color || COLORS.ui.score;
      this.particles = [];
      for (let i = 0; i < 8; i++) {
        const angle = (i / 8) * Math.PI * 2;
        this.particles.push({ x, y, vx: Math.cos(angle) * 3, vy: Math.sin(angle) * 3, size: 2 + Math.random() * 2 });
      }
    }
    update() {
      this.life -= 0.03;
      for (let p of this.particles) { p.x += p.vx; p.y += p.vy; p.vy -= 0.05; }
    }
    draw() {
      ctx.save();
      ctx.globalAlpha = this.life;
      for (let p of this.particles) {
        ctx.fillStyle = COLORS.wormLight;
        ctx.beginPath(); ctx.arc(p.x, p.y, p.size * this.life, 0, Math.PI * 2); ctx.fill();
      }
      ctx.fillStyle = this.color;
      ctx.font = 'bold 14px sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText(this.text, this.x, this.y - 15 - (1 - this.life) * 20);
      ctx.restore();
    }
  }

  // ============================================================
  // COLLISION DETECTION
  // ============================================================

  function checkCollision(a, b) {
    return a.x < b.x + b.w && a.x + a.w > b.x && a.y < b.y + b.h && a.y + a.h > b.y;
  }

  // UI SCREENS
  // ============================================================

  function drawHUD() {
    ctx.save();

    ctx.fillStyle = COLORS.ui.bg;
    ctx.beginPath();
    ctx.roundRect(10, 10, 210, 50, 10);
    ctx.fill();

    ctx.fillStyle = COLORS.ui.accent;
    ctx.font = 'bold 16px sans-serif';
    ctx.textAlign = 'left';
    ctx.fillText('🐛 점수', 22, 30);
    ctx.fillStyle = COLORS.ui.text;
    ctx.font = 'bold 18px sans-serif';
    ctx.fillText(score.toString(), 22, 50);

    ctx.fillStyle = COLORS.ui.accent;
    ctx.font = 'bold 16px sans-serif';
    ctx.fillText('📏 거리', 120, 30);
    ctx.fillStyle = COLORS.ui.text;
    ctx.font = 'bold 18px sans-serif';
    ctx.fillText(Math.floor(distance) + 'm', 120, 50);

    // 최고기록
    ctx.fillStyle = COLORS.ui.score;
    ctx.font = 'bold 13px sans-serif';
    ctx.textAlign = 'right';
    ctx.fillText('🏆 ' + highScore, GAME_WIDTH - 16, 28);

    // 콤보 표시
    if (comboCount >= 2) {
      const pulse = 1 + Math.sin(frameCount * 0.3) * 0.08;
      ctx.save();
      ctx.translate(GAME_WIDTH / 2, 44);
      ctx.scale(pulse, pulse);
      ctx.fillStyle = COLORS.ui.accent;
      ctx.font = 'bold 26px sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText('COMBO ×' + Math.min(comboCount, 5), 0, 0);
      ctx.restore();
    }

    // 파워업 잔여 타이머 아이콘
    let iconX = GAME_WIDTH - 30;
    const iconY = 50;
    if (player && player.magnetTimer > 0) {
      drawPowerIcon(iconX, iconY, 'magnet', player.magnetTimer / MAGNET_TIME);
      iconX -= 40;
    }
    if (player && player.shield) {
      drawPowerIcon(iconX, iconY, 'shield', player.shieldTimer / SHIELD_TIME);
    }

    ctx.restore();
  }

  function drawPowerIcon(x, y, type, ratio) {
    ctx.save();
    ctx.fillStyle = 'rgba(0,0,0,0.45)';
    ctx.beginPath(); ctx.arc(x, y, 15, 0, Math.PI * 2); ctx.fill();
    // 잔여 게이지
    ctx.strokeStyle = type === 'magnet' ? COLORS.magnet : COLORS.shield;
    ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.arc(x, y, 13, -Math.PI / 2, -Math.PI / 2 + Math.PI * 2 * ratio);
    ctx.stroke();
    ctx.fillStyle = '#fff';
    ctx.font = '14px sans-serif';
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText(type === 'magnet' ? '🧲' : '🛡️', x, y + 1);
    ctx.restore();
  }

  function drawGameOverScreen() {
    ctx.fillStyle = 'rgba(0,0,0,0.5)';

    ctx.globalAlpha = pulse;
    ctx.fillStyle = COLORS.ui.accent;
    ctx.font = 'bold 18px sans-serif';
    ctx.fillText('터치하거나 스페이스로 다시 시작!', cx, cy + 108);
    ctx.globalAlpha = 1;
  }

  // ============================================================
  // GAME LOGIC
  // ============================================================

  let player = null;

  function initGame() {
    player = new Player();
    obstacles = [];
    collectibles = [];
    powerups = [];
    dustParticles = [];
    collectEffects = [];
    gameSpeed = INITIAL_SPEED;
    distance = 0;
    score = 0;
    frameCount = 0;
    screenShake = 0;
    comboCount = 0;
    comboTimer = 0;
    isNewRecord = false;
    initBackground();
  }

  function startGame() {
    initGame();
    gameState = STATE.PLAYING;
    audio();
    startBgm();
  }

  function finalizeRun() {
    if (score > highScore) {
      highScore = score;
      isNewRecord = true;
      try { localStorage.setItem(HS_KEY, String(highScore)); } catch (e) {}
      sndRecord();
    }
  }

  function collectWorm(col) {
    col.collected = true;
    comboCount++;
    comboTimer = 0;
    const mult = Math.min(comboCount, 5);
    const pts = 10 * mult;
    score += pts;
    collectEffects.push(new CollectEffect(col.x, col.y, '+' + pts, mult > 1 ? '#FFD54A' : COLORS.ui.score));
    sndCollect(comboCount);
  }

  function updateGame() {
    frameCount++;

    gameSpeed = Math.min(INITIAL_SPEED + distance * SPEED_INCREMENT, MAX_SPEED);
    distance += gameSpeed * 0.05;

    // 콤보 데케이
    if (comboCount > 0) {
      comboTimer++;
      if (comboTimer > COMBO_WINDOW) { comboCount = 0; comboTimer = 0; }
    }

    updateBackground();
    player.update();

    if (frameCount % 60 === 0 || Math.random() < 0.01 * (gameSpeed / INITIAL_SPEED)) spawnObstacle();
    if (Math.random() < 0.02) spawnCollectible();
    // 파워업: 가끔 등장 (~5초마다 확률)
    if (frameCount % 300 === 0 && Math.random() < 0.7) spawnPowerUp();

    // 장애물
    for (let obs of obstacles) {
      obs.update();
      if (player.alive && !obs.passed && checkCollision(player.hitbox, obs.hitbox)) {
        obs.passed = true;
        player.onHit(); // 실드 있으면 흡수, 없으면 사망
      }
      // 근접 회피 보너스 (점프로 아슬하게 스쳐 넘김 — 발과 장애물 윗면 간격이 좁을 때만)
      if (player.alive && !obs.scored && obs.x < player.x - 20) {
        obs.scored = true;
        const gap = obs.y - player.y; // 병아리 발(player.y)이 장애물 윗면(obs.y) 위로 떨어진 거리
        if (player.isJumping && !obs.passed && gap >= 0 && gap <= 34) {
          score += 5;
          collectEffects.push(new CollectEffect(player.x, player.y - 40, '아슬! +5', '#7FE0FF'));
          sndNearMiss();
        }
      }
    }
    obstacles = obstacles.filter(o => o.x > -60);

    // 지렁이
    for (let col of collectibles) {
      col.update();
      if (!col.collected && player.alive && checkCollision(player.hitbox, col.hitbox)) {
        collectWorm(col);
      }
    }
    collectibles = collectibles.filter(c => c.x > -30 && !c.collected);

    // 파워업
    for (let pu of powerups) {
      pu.update();
      if (!pu.collected && player.alive && checkCollision(player.hitbox, pu.hitbox)) {
        pu.collected = true;
        if (pu.type === 'magnet') player.giveMagnet();
        else player.giveShield();
        collectEffects.push(new CollectEffect(pu.x, pu.y, pu.type === 'magnet' ? '🧲 자석!' : '🛡️ 실드!', '#fff'));
        sndPower();
      }
    }
    powerups = powerups.filter(p => p.x > -40 && !p.collected);

    for (let p of dustParticles) p.update();
    dustParticles = dustParticles.filter(p => p.life > 0);

    for (let e of collectEffects) e.update();
    collectEffects = collectEffects.filter(e => e.life > 0);

    if (screenShake > 0) screenShake *= 0.85;
    if (screenShake < 0.5) screenShake = 0;
  }

  function drawGame() {
    ctx.save();

    if (screenShake > 0) {
      ctx.translate((Math.random() - 0.5) * screenShake, (Math.random() - 0.5) * screenShake);
    }

    ctx.clearRect(-10, -10, GAME_WIDTH + 20, GAME_HEIGHT + 20);
    drawBackground();

    for (let col of collectibles) col.draw();
    for (let pu of powerups) pu.draw();
    for (let obs of obstacles) obs.draw();
    player.draw();

    for (let p of dustParticles) p.draw();
    for (let e of collectEffects) e.draw();

    drawHUD();
    ctx.restore();
  }

  // ============================================================
  // MAIN LOOP
  // ============================================================

  function gameLoop() {
    switch (gameState) {
      case STATE.MENU:
        frameCount++;
        updateBackground();
        ctx.clearRect(0, 0, GAME_WIDTH, GAME_HEIGHT);
        drawBackground();
        drawMenuScreen();
        break;
      case STATE.PLAYING:
        updateGame();
        drawGame();
        break;
      case STATE.GAMEOVER:
        frameCount++;
        gameSpeed *= 0.98;
        updateBackground();
        drawGame();
        drawGameOverScreen();
        break;
    }
    requestAnimationFrame(gameLoop);
  }

  // ============================================================
  // INPUT HANDLING
  // ============================================================

  let touchStartY = 0;
  let touchHandled = false;

  canvas.addEventListener('touchstart', (e) => {
    e.preventDefault();
    touchStartY = e.touches[0].clientY;
    touchHandled = false;
    handleInput();
  }, { passive: false });

  canvas.addEventListener('touchmove', (e) => {
    e.preventDefault();
    const dy = e.touches[0].clientY - touchStartY;
    if (Math.abs(dy) > 30 && !touchHandled) {
      touchHandled = true;
      if (dy > 0 && gameState === STATE.PLAYING && player) player.slide();
    }
  }, { passive: false });

  canvas.addEventListener('touchend', (e) => { e.preventDefault(); }, { passive: false });

  canvas.addEventListener('mousedown', (e) => { e.preventDefault(); handleInput(); });

  const keys = {};
  document.addEventListener('keydown', (e) => {
    if (e.repeat) return;
    keys[e.code] = true;
    if (e.code === 'Space' || e.code === 'ArrowUp') { e.preventDefault(); handleInput('jump'); }
    if (e.code === 'ArrowDown') { e.preventDefault(); handleInput('slide'); }
    if (e.code === 'KeyM') toggleSound();
  });
  document.addEventListener('keyup', (e) => { keys[e.code] = false; });

  function handleInput(action) {
    switch (gameState) {
      case STATE.MENU:
        startGame();
        break;
      case STATE.PLAYING:
        if (player && player.alive) {
          if (action === 'slide') player.slide();
          else player.jump();
        }
        break;
      case STATE.GAMEOVER:
        startGame();
        break;
    }
  }

  function toggleSound() {
    soundOn = !soundOn;
    document.getElementById('snd').textContent = soundOn ? '🔊' : '🔇';
    if (soundOn) { audio(); if (gameState === STATE.PLAYING) startBgm(); }
    else stopBgm();
  }
  document.getElementById('snd').addEventListener('click', (e) => { e.stopPropagation(); toggleSound(); });

  // ============================================================
  // INIT & START
  // ============================================================

  initGame();
  gameLoop();
  </script>
</body>
</html>
