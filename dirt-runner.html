<!-- 흙속의 병아리 러너 DX — 피버·2단점프·페이즈·잔상 베이스 + 파워업(자석/실드)·최고기록 localStorage 저장·근접회피 이식 머지판 (2026-06-26) -->
<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>🐣 흙속의 병아리 - Dirt Runner DX</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #1a0d05;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      overflow: hidden;
      touch-action: none;
      -webkit-user-select: none;
      user-select: none;
    }
    canvas {
      display: block;
      image-rendering: pixelated;
    }
  </style>
</head>
<body>
  <canvas id="gameCanvas"></canvas>
  <script>
  // ============================================================
  // 🐥 흙속의 병아리 DX (Dirt Chick Runner DX)
  // Hyper-action endless runner with juice, combos & fever
  // ============================================================

  const canvas = document.getElementById('gameCanvas');
  const ctx = canvas.getContext('2d');

  // --- Canvas Sizing ---
  const GAME_WIDTH = 800;
  const GAME_HEIGHT = 450;
  const GROUND_Y = 340;

  function resizeCanvas() {
    const ratio = GAME_WIDTH / GAME_HEIGHT;
    let w = window.innerWidth;
    let h = window.innerHeight;
    if (w / h > ratio) {
      w = h * ratio;
    } else {
      h = w / ratio;
    }
    canvas.width = GAME_WIDTH;
    canvas.height = GAME_HEIGHT;
    canvas.style.width = w + 'px';
    canvas.style.height = h + 'px';
  }
  window.addEventListener('resize', resizeCanvas);
  resizeCanvas();

  // --- Constants ---
  const GRAVITY = 0.6;
  const JUMP_FORCE = -12;
  const INITIAL_SPEED = 4;
  const MAX_SPEED = 12;
  const PLAYER_X = 130;
  const MAGNET_TIME = 420;   // 자석 지속(~7s)
  const SHIELD_TIME = 720;   // 실드 최대 지속(~12s)
  const HS_KEY = 'dirtrunner_highscore_v1';

  // --- Game State ---
  const STATE = { MENU: 0, PLAYING: 1, GAMEOVER: 2 };
  let gameState = STATE.MENU;
  let gameSpeed = INITIAL_SPEED;
  let distance = 0;
  let score = 0;
  let highScore = 0;
  let frameCount = 0;
  let lastObstacleX = 0;
  let dustParticles = [];
  let collectEffects = [];
  let screenShake = 0;
  let screenShakeMax = 0;
  let flashColor = '255,255,255';
  let flashAlpha = 0;
  let hitStopTimer = 0;
  let punchZoom = 1;
  let feverActive = false;
  let feverTimer = 0;
  let feverMeter = 0;          // 0-100 toward fever activation
  let comboCount = 0;
  let comboTimer = 0;
  const COMBO_WINDOW = 90;     // frames before combo resets
  const FEVER_DURATION = 360;  // 6 sec at 60fps
  let phase = 1;               // difficulty phase
  let isNewRecord = false;
  let powerups = [];
  try { highScore = parseInt(localStorage.getItem(HS_KEY), 10) || 0; } catch (e) { highScore = 0; }

  // ============================================================
  // AUDIO ENGINE - Web Audio API synthesis (no files needed)
  // ============================================================

  class AudioEngine {
    constructor() {
      this.ctx = null;
      this.master = null;
      this.muted = false;
      this.bgmTimer = 0;
      this.bgmStep = 0;
      this.bgmPlaying = false;
    }
    init() {
      if (this.ctx) return;
      try {
        this.ctx = new (window.AudioContext || window.webkitAudioContext)();
        this.master = this.ctx.createGain();
        this.master.gain.value = 0.5;
        this.master.connect(this.ctx.destination);
      } catch (e) {
        console.warn('AudioContext unavailable', e);
      }
    }
    resume() {
      if (this.ctx && this.ctx.state === 'suspended') this.ctx.resume();
    }
    toggleMute() {
      this.muted = !this.muted;
      if (this.master) this.master.gain.value = this.muted ? 0 : 0.5;
    }
    // core tone builder
    tone(freq, dur, type = 'square', vol = 0.3, slideTo = null) {
      if (!this.ctx || this.muted) return;
      const t = this.ctx.currentTime;
      const osc = this.ctx.createOscillator();
      const g = this.ctx.createGain();
      osc.type = type;
      osc.frequency.setValueAtTime(freq, t);
      if (slideTo !== null) osc.frequency.exponentialRampToValueAtTime(Math.max(1, slideTo), t + dur);
      g.gain.setValueAtTime(vol, t);
      g.gain.exponentialRampToValueAtTime(0.001, t + dur);
      osc.connect(g);
      g.connect(this.master);
      osc.start(t);
      osc.stop(t + dur + 0.02);
    }
    noise(dur, vol = 0.3, filterFreq = 1000) {
      if (!this.ctx || this.muted) return;
      const t = this.ctx.currentTime;
      const bufferSize = Math.floor(this.ctx.sampleRate * dur);
      const buffer = this.ctx.createBuffer(1, bufferSize, this.ctx.sampleRate);
      const data = buffer.getChannelData(0);
      for (let i = 0; i < bufferSize; i++) data[i] = Math.random() * 2 - 1;
      const src = this.ctx.createBufferSource();
      src.buffer = buffer;
      const filter = this.ctx.createBiquadFilter();
      filter.type = 'lowpass';
      filter.frequency.value = filterFreq;
      const g = this.ctx.createGain();
      g.gain.setValueAtTime(vol, t);
      g.gain.exponentialRampToValueAtTime(0.001, t + dur);
      src.connect(filter);
      filter.connect(g);
      g.connect(this.master);
      src.start(t);
      src.stop(t + dur);
    }
    jump() {
      this.tone(330, 0.12, 'square', 0.25, 660);
    }
    doubleJump() {
      this.tone(520, 0.12, 'square', 0.22, 880);
    }
    slide() {
      this.noise(0.18, 0.15, 1400);
    }
    collect() {
      const base = 660 + Math.min(comboCount, 12) * 40;
      this.tone(base, 0.08, 'triangle', 0.3);
      setTimeout(() => this.tone(base * 1.5, 0.1, 'triangle', 0.25), 50);
    }
    combo() {
      this.tone(880, 0.1, 'square', 0.2);
      setTimeout(() => this.tone(1320, 0.12, 'square', 0.2), 60);
    }
    die() {
      this.noise(0.5, 0.4, 600);
      this.tone(220, 0.5, 'sawtooth', 0.3, 60);
    }
    feverIn() {
      const notes = [523, 659, 784, 1047];
      notes.forEach((f, i) => setTimeout(() => this.tone(f, 0.15, 'square', 0.3), i * 80));
    }
    shieldHit() { this.tone(900, 0.25, 'sine', 0.25, 200); this.noise(0.12, 0.12, 800); }
    power() { [523, 659, 784, 1047].forEach((f, i) => setTimeout(() => this.tone(f, 0.12, 'square', 0.2), i * 50)); }
    // lightweight procedural BGM driven by frame ticks
    updateBgm() {
      if (!this.ctx || this.muted || gameState !== STATE.PLAYING) return;
      this.bgmTimer++;
      const tempo = feverActive ? 6 : 10;
      if (this.bgmTimer >= tempo) {
        this.bgmTimer = 0;
        const bass = [131, 131, 165, 196];
        const arp = [392, 523, 659, 784, 880, 784, 659, 523];
        if (feverActive) {
          const arpF = [523, 659, 784, 1047, 880, 1047, 784, 659];
          this.tone(arpF[this.bgmStep % arpF.length], 0.1, 'square', 0.12);
          this.tone(bass[this.bgmStep % 4] * 2, 0.1, 'triangle', 0.1);
        } else {
          this.tone(arp[this.bgmStep % arp.length], 0.08, 'triangle', 0.08);
          if (this.bgmStep % 2 === 0) this.tone(bass[this.bgmStep % 4], 0.15, 'sine', 0.18);
        }
        this.bgmStep++;
      }
    }
  }

  const audio = new AudioEngine();

  // ============================================================
  // COLOR PALETTE (phase-aware)
  // ============================================================

  const PALETTES = [
    { // Phase 1 - morning
      skyTop: '#87CEEB', skyBottom: '#E0F0FF', sun: '#FFE066',
      grass: '#5DA832', grassDark: '#4A8A28',
      groundTop: '#8B6914', groundMid: '#6B4E0A', groundBottom: '#4A3506'
    },
    { // Phase 2 - sunset
      skyTop: '#FF8E5C', skyBottom: '#FFD0A8', sun: '#FFB347',
      grass: '#7AA028', grassDark: '#5C7E1A',
      groundTop: '#9B6814', groundMid: '#724E0A', groundBottom: '#4A2F06'
    },
    { // Phase 3 - night/danger
      skyTop: '#3A1A5C', skyBottom: '#7A3A8C', sun: '#FFD866',
      grass: '#2A7A5C', grassDark: '#1E5C44',
      groundTop: '#5A3814', groundMid: '#3E2608', groundBottom: '#241604'
    }
  ];
  function palette() { return PALETTES[Math.min(phase - 1, PALETTES.length - 1)]; }

  const COLORS = {
    cloud: 'rgba(255,255,255,0.9)',
    dirtDot: '#7A5C10',
    chick: { body: '#FFE14D', bodyDark: '#F5D030', beak: '#FF8C00', feet: '#FF6B35', eye: '#2D1B00', cheek: 'rgba(255,150,100,0.5)' },
    rock: '#8A8A8A', rockDark: '#6A6A6A', rockLight: '#A0A0A0',
    branch: '#6B3A1F', branchLight: '#8B5A3A',
    worm: '#E88FBF', wormDark: '#D070A0', wormLight: '#FFB0D8',
    ui: { bg: 'rgba(0,0,0,0.5)', text: '#FFFFFF', accent: '#FFE14D', score: '#FFD700', danger: '#FF6B35' }
  };

  // ============================================================
  // BACKGROUND - Parallax layers
  // ============================================================

  class Cloud {
    constructor() { this.reset(true); }
    reset(initial) {
      this.x = initial ? Math.random() * GAME_WIDTH : GAME_WIDTH + Math.random() * 200;
      this.y = 30 + Math.random() * 100;
      this.width = 60 + Math.random() * 80;
      this.height = 25 + Math.random() * 20;
      this.speed = 0.2 + Math.random() * 0.3;
      this.opacity = 0.5 + Math.random() * 0.4;
    }
    update() {
      this.x -= this.speed * (gameSpeed / INITIAL_SPEED);
      if (this.x + this.width < -50) this.reset(false);
    }
    draw() {
      ctx.save();
      ctx.globalAlpha = this.opacity;
      ctx.fillStyle = COLORS.cloud;
      const cx = this.x + this.width / 2;
      const cy = this.y + this.height / 2;
      ctx.beginPath();
      ctx.ellipse(cx, cy, this.width / 2, this.height / 2, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.beginPath();
      ctx.ellipse(cx - this.width * 0.25, cy + 3, this.width * 0.3, this.height * 0.35, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.beginPath();
      ctx.ellipse(cx + this.width * 0.25, cy + 2, this.width * 0.25, this.height * 0.3, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();
    }
  }

  class BackgroundBush {
    constructor() { this.reset(true); }
    reset(initial) {
      this.x = initial ? Math.random() * GAME_WIDTH : GAME_WIDTH + Math.random() * 100;
      this.type = Math.random() > 0.5 ? 'bush' : 'flower';
      this.size = 0.6 + Math.random() * 0.6;
    }
    update() {
      this.x -= gameSpeed * 0.5;
      if (this.x < -50) this.reset(false);
    }
    draw() {
      ctx.save();
      const pal = palette();
      if (this.type === 'bush') {
        const s = this.size;
        const bx = this.x;
        const by = GROUND_Y - 2;
        ctx.fillStyle = pal.grassDark;
        ctx.beginPath();
        ctx.ellipse(bx, by - 10 * s, 15 * s, 12 * s, 0, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = pal.grass;
        ctx.beginPath();
        ctx.ellipse(bx + 5 * s, by - 8 * s, 10 * s, 8 * s, 0, 0, Math.PI * 2);
        ctx.fill();
      } else {
        const s = this.size;
        const fx = this.x;
        const fy = GROUND_Y;
        ctx.strokeStyle = pal.grassDark;
        ctx.lineWidth = 2 * s;
        ctx.beginPath();
        ctx.moveTo(fx, fy);
        ctx.lineTo(fx, fy - 18 * s);
        ctx.stroke();
        const flowerColors = ['#FF6B9D', '#FFB347', '#87CEEB', '#DDA0DD'];
        ctx.fillStyle = flowerColors[Math.floor(Math.abs(this.x) / 7) % flowerColors.length];
        for (let i = 0; i < 5; i++) {
          const angle = (i / 5) * Math.PI * 2 - Math.PI / 2;
          const px = fx + Math.cos(angle) * 5 * s;
          const py = fy - 18 * s + Math.sin(angle) * 5 * s;
          ctx.beginPath();
          ctx.ellipse(px, py, 4 * s, 3 * s, angle, 0, Math.PI * 2);
          ctx.fill();
        }
        ctx.fillStyle = '#FFE14D';
        ctx.beginPath();
        ctx.arc(fx, fy - 18 * s, 3 * s, 0, Math.PI * 2);
        ctx.fill();
      }
      ctx.restore();
    }
  }

  class DirtPattern {
    constructor() {
      this.dots = [];
      for (let i = 0; i < 30; i++) {
        this.dots.push({
          x: Math.random() * (GAME_WIDTH + 200),
          y: GROUND_Y + 8 + Math.random() * 80,
          size: 1 + Math.random() * 3,
          shade: Math.random() > 0.5 ? COLORS.dirtDot : '#3A2604'
        });
      }
    }
    update() {
      for (let d of this.dots) {
        d.x -= gameSpeed;
        if (d.x < -10) {
          d.x = GAME_WIDTH + Math.random() * 50;
          d.y = GROUND_Y + 8 + Math.random() * 80;
        }
      }
    }
    draw() {
      for (let d of this.dots) {
        ctx.fillStyle = d.shade;
        ctx.beginPath();
        ctx.arc(d.x, d.y, d.size, 0, Math.PI * 2);
        ctx.fill();
      }
    }
  }

  let clouds = [];
  let bushes = [];
  let dirtPattern = null;
  let bgScrollX = 0;
  let speedLines = [];

  function initBackground() {
    clouds = [];
    bushes = [];
    speedLines = [];
    for (let i = 0; i < 5; i++) clouds.push(new Cloud());
    for (let i = 0; i < 8; i++) bushes.push(new BackgroundBush());
    dirtPattern = new DirtPattern();
  }

  function updateBackground() {
    bgScrollX += gameSpeed;
    for (let c of clouds) c.update();
    for (let b of bushes) b.update();
    dirtPattern.update();
    // speed lines appear with high speed or fever
    const lineChance = (gameSpeed > 7 ? 0.3 : 0.05) + (feverActive ? 0.5 : 0);
    if (Math.random() < lineChance) {
      speedLines.push({
        x: GAME_WIDTH + 20,
        y: Math.random() * GROUND_Y,
        len: 30 + Math.random() * 60,
        life: 1
      });
    }
    for (let s of speedLines) {
      s.x -= gameSpeed * 3;
      s.life -= 0.04;
    }
    speedLines = speedLines.filter(s => s.life > 0 && s.x > -100);
  }

  function drawBackground() {
    const pal = palette();
    // Sky gradient
    const skyGrad = ctx.createLinearGradient(0, 0, 0, GROUND_Y);
    skyGrad.addColorStop(0, pal.skyTop);
    skyGrad.addColorStop(1, pal.skyBottom);
    ctx.fillStyle = skyGrad;
    ctx.fillRect(0, 0, GAME_WIDTH, GROUND_Y);

    // Fever color tint
    if (feverActive) {
      const hue = (frameCount * 4) % 360;
      ctx.fillStyle = `hsla(${hue}, 80%, 60%, 0.12)`;
      ctx.fillRect(0, 0, GAME_WIDTH, GROUND_Y);
    }

    // Sun
    const sunX = 650, sunY = 70;
    ctx.fillStyle = 'rgba(255,224,102,0.3)';
    ctx.beginPath();
    ctx.arc(sunX, sunY, 50, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = pal.sun;
    ctx.beginPath();
    ctx.arc(sunX, sunY, 28, 0, Math.PI * 2);
    ctx.fill();

    // Clouds
    for (let c of clouds) c.draw();

    // Speed lines
    for (let s of speedLines) {
      ctx.strokeStyle = `rgba(255,255,255,${s.life * 0.5})`;
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(s.x, s.y);
      ctx.lineTo(s.x + s.len, s.y);
      ctx.stroke();
    }

    // Background bushes
    for (let b of bushes) b.draw();

    // Ground
    const groundGrad = ctx.createLinearGradient(0, GROUND_Y, 0, GAME_HEIGHT);
    groundGrad.addColorStop(0, pal.groundTop);
    groundGrad.addColorStop(0.1, pal.groundMid);
    groundGrad.addColorStop(1, pal.groundBottom);
    ctx.fillStyle = groundGrad;
    ctx.fillRect(0, GROUND_Y, GAME_WIDTH, GAME_HEIGHT - GROUND_Y);

    // Grass line
    ctx.fillStyle = pal.grass;
    ctx.fillRect(0, GROUND_Y - 3, GAME_WIDTH, 6);
    for (let i = 0; i < GAME_WIDTH; i += 15) {
      const offset = (i + bgScrollX * 0.8) % GAME_WIDTH;
      const gx = (GAME_WIDTH - offset) % GAME_WIDTH;
      const h = 5 + Math.sin(i * 0.3) * 3;
      ctx.fillStyle = pal.grass;
      ctx.beginPath();
      ctx.moveTo(gx - 3, GROUND_Y);
      ctx.lineTo(gx, GROUND_Y - h);
      ctx.lineTo(gx + 3, GROUND_Y);
      ctx.fill();
    }

    dirtPattern.draw();

    ctx.strokeStyle = 'rgba(0,0,0,0.15)';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(0, GROUND_Y);
    ctx.lineTo(GAME_WIDTH, GROUND_Y);
    ctx.stroke();
  }

  // ============================================================
  // PLAYER - Chick
  // ============================================================

  class Player {
    constructor() {
      this.x = PLAYER_X;
      this.y = GROUND_Y;
      this.width = 30;
      this.height = 32;
      this.vy = 0;
      this.isJumping = false;
      this.isSliding = false;
      this.slideTimer = 0;
      this.runFrame = 0;
      this.runTimer = 0;
      this.blinkTimer = 0;
      this.isBlinking = false;
      this.alive = true;
      this.deathTimer = 0;
      this.jumpCount = 0;
      this.maxJumps = 2; // double jump
      this.afterImages = [];
      this.squashTimer = 0;
      this.invincible = false;
      this.shield = false;
      this.shieldTimer = 0;
      this.shieldIframe = 0;
      this.magnetTimer = 0;
    }

    get hasMagnet() { return this.magnetTimer > 0; }

    get hitbox() {
      if (this.isSliding) {
        return { x: this.x - 15, y: this.y - 12, w: 30, h: 12 };
      }
      return { x: this.x - 14, y: this.y - 32, w: 28, h: 32 };
    }

    jump() {
      if (this.isSliding) return;
      if (this.jumpCount < this.maxJumps) {
        this.vy = this.jumpCount === 0 ? JUMP_FORCE : JUMP_FORCE * 0.85;
        this.isJumping = true;
        this.jumpCount++;
        this.squashTimer = 8;
        spawnDust(this.x, this.y, 5);
        if (this.jumpCount === 1) audio.jump();
        else { audio.doubleJump(); spawnDust(this.x, this.y - 10, 6); }
      }
    }

    slide() {
      if (!this.isJumping && !this.isSliding) {
        this.isSliding = true;
        this.slideTimer = 30;
        audio.slide();
        spawnDust(this.x - 10, this.y, 8);
      }
    }

    die() {
      if (this.alive && !this.invincible) {
        this.alive = false;
        this.deathTimer = 0;
        triggerShake(22, 22);
        triggerFlash('255,80,60', 0.7);
        hitStopTimer = 8;
        audio.die();
        spawnExplosion(this.x, this.y - 16);
        spawnDust(this.x, this.y, 20);
      }
    }

    update() {
      if (!this.alive) {
        this.deathTimer++;
        if (this.deathTimer > 60) {
          gameState = STATE.GAMEOVER;
          finalizeRun();
        }
        return;
      }

      if (this.shieldTimer > 0) { this.shieldTimer--; if (this.shieldTimer === 0) this.shield = false; }
      if (this.shieldIframe > 0) this.shieldIframe--;
      if (this.magnetTimer > 0) this.magnetTimer--;

      // after image trail when fast or fever
      if ((gameSpeed > 7 || feverActive) && !this.isJumping && frameCount % 3 === 0) {
        this.afterImages.push({ x: this.x, y: this.y, frame: this.runFrame, sliding: this.isSliding, life: 0.6, jumping: this.isJumping });
      }
      for (let a of this.afterImages) a.life -= 0.06;
      this.afterImages = this.afterImages.filter(a => a.life > 0);

      if (this.isJumping) {
        this.vy += GRAVITY;
        this.y += this.vy;
        if (this.y >= GROUND_Y) {
          this.y = GROUND_Y;
          this.isJumping = false;
          this.vy = 0;
          this.jumpCount = 0;
          this.squashTimer = 6;
          spawnDust(this.x, this.y, 3);
        }
      }

      if (this.isSliding) {
        this.slideTimer--;
        if (this.slideTimer <= 0) this.isSliding = false;
      }

      if (this.squashTimer > 0) this.squashTimer--;

      this.runTimer++;
      if (this.runTimer > 5) {
        this.runTimer = 0;
        this.runFrame = (this.runFrame + 1) % 4;
      }

      this.blinkTimer++;
      if (!this.isBlinking && this.blinkTimer > 100 + Math.random() * 80) {
        this.isBlinking = true;
        this.blinkTimer = 0;
      }
      if (this.isBlinking && this.blinkTimer > 8) {
        this.isBlinking = false;
        this.blinkTimer = 0;
      }

      if (!this.isJumping && !this.isSliding && frameCount % 8 === 0) {
        spawnDust(this.x - 8, this.y, 1);
      }
    }

    drawAfterImages() {
      for (let a of this.afterImages) {
        ctx.save();
        ctx.globalAlpha = a.life * 0.4;
        const hue = feverActive ? (frameCount * 6) % 360 : 50;
        ctx.filter = feverActive ? `hue-rotate(${frameCount * 6}deg)` : 'none';
        if (a.sliding) this.drawSliding(a.x, a.y, true);
        else this.drawRunning(a.x, a.y, a.frame, true);
        ctx.filter = 'none';
        ctx.restore();
      }
    }

    draw() {
      ctx.save();
      this.drawAfterImages();

      const px = this.x;
      const py = this.y;

      if (!this.alive) {
        const t = this.deathTimer / 60;
        ctx.globalAlpha = 1 - t;
        ctx.translate(px, py - 16);
        ctx.rotate(t * Math.PI * 4);
        ctx.translate(-px, -(py - 16));
      }

      // invincibility flicker (fever / shield i-frame)
      if ((this.invincible || this.shieldIframe > 0) && Math.floor(frameCount / 4) % 2 === 0) {
        ctx.globalAlpha = 0.6;
      }

      if (this.isSliding) {
        this.drawSliding(px, py);
      } else {
        this.drawRunning(px, py, this.runFrame);
      }

      ctx.restore();

      // 자석 오라
      if (this.alive && this.hasMagnet) {
        ctx.save();
        ctx.globalAlpha = 0.18 + Math.sin(frameCount * 0.2) * 0.07;
        ctx.strokeStyle = '#E8443A';
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.arc(px, py - 16, 60, 0, Math.PI * 2);
        ctx.stroke();
        ctx.restore();
      }
      // 실드 버블
      if (this.alive && this.shield) {
        ctx.save();
        const r = 27 + Math.sin(frameCount * 0.15) * 2;
        ctx.globalAlpha = 0.35 + Math.sin(frameCount * 0.15) * 0.1;
        ctx.strokeStyle = '#5BB8FF';
        ctx.lineWidth = 3;
        ctx.beginPath();
        ctx.arc(px, py - 14, r, 0, Math.PI * 2);
        ctx.stroke();
        ctx.globalAlpha = 0.12;
        ctx.fillStyle = '#5BB8FF';
        ctx.beginPath();
        ctx.arc(px, py - 14, r, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
      }
    }

    drawRunning(px, py, runFrame, ghost = false) {
      const legOffset = this.isJumping ? 3 : Math.sin(runFrame * Math.PI / 2) * 5;
      const bodyBob = this.isJumping ? 0 : Math.abs(Math.sin(runFrame * Math.PI / 2)) * 2;
      const squashY = this.squashTimer > 0 ? 1 + (this.squashTimer / 8) * 0.25 : 1;
      const squashX = this.squashTimer > 0 ? 1 - (this.squashTimer / 8) * 0.18 : 1;

      if (!ghost) {
        ctx.fillStyle = 'rgba(0,0,0,0.15)';
        ctx.beginPath();
        ctx.ellipse(px, py + 1, 16, 4, 0, 0, Math.PI * 2);
        ctx.fill();
      }

      ctx.fillStyle = COLORS.chick.feet;
      ctx.beginPath();
      ctx.ellipse(px - 5 + legOffset * 0.3, py - 2, 6, 3, -0.2, 0, Math.PI * 2);
      ctx.fill();
      ctx.beginPath();
      ctx.ellipse(px + 5 - legOffset * 0.3, py - 2, 6, 3, 0.2, 0, Math.PI * 2);
      ctx.fill();

      const by = py - 18 - bodyBob;
      ctx.save();
      ctx.translate(px, by);
      ctx.scale(squashX, squashY);
      ctx.translate(-px, -by);

      ctx.fillStyle = COLORS.chick.body;
      ctx.beginPath();
      ctx.ellipse(px, by, 14, 16, 0, 0, Math.PI * 2);
      ctx.fill();

      ctx.fillStyle = COLORS.chick.bodyDark;
      ctx.beginPath();
      ctx.ellipse(px + 2, by + 5, 10, 8, 0, 0, Math.PI * 2);
      ctx.fill();

      const wingFlap = this.isJumping ? -3 : Math.sin(runFrame * Math.PI / 2) * 4;
      ctx.fillStyle = COLORS.chick.bodyDark;
      ctx.beginPath();
      ctx.ellipse(px - 12, by - 2 + wingFlap, 5, 8, -0.4, 0, Math.PI * 2);
      ctx.fill();
      ctx.beginPath();
      ctx.ellipse(px + 12, by - 2 - wingFlap, 5, 8, 0.4, 0, Math.PI * 2);
      ctx.fill();

      ctx.fillStyle = COLORS.chick.cheek;
      ctx.beginPath();
      ctx.ellipse(px - 10, by + 3, 4, 3, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.beginPath();
      ctx.ellipse(px + 10, by + 3, 4, 3, 0, 0, Math.PI * 2);
      ctx.fill();

      const eyeY = by - 4;
      ctx.fillStyle = '#FFFFFF';
      ctx.beginPath();
      ctx.ellipse(px - 6, eyeY, 5, 5, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.beginPath();
      ctx.ellipse(px + 6, eyeY, 5, 5, 0, 0, Math.PI * 2);
      ctx.fill();

      if (this.isBlinking) {
        ctx.strokeStyle = COLORS.chick.eye;
        ctx.lineWidth = 1.5;
        ctx.beginPath();
        ctx.moveTo(px - 9, eyeY); ctx.lineTo(px - 3, eyeY);
        ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(px + 3, eyeY); ctx.lineTo(px + 9, eyeY);
        ctx.stroke();
      } else {
        ctx.fillStyle = COLORS.chick.eye;
        ctx.beginPath();
        ctx.arc(px - 5, eyeY + 1, 2.5, 0, Math.PI * 2);
        ctx.fill();
        ctx.beginPath();
        ctx.arc(px + 5, eyeY + 1, 2.5, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = '#FFFFFF';
        ctx.beginPath();
        ctx.arc(px - 4, eyeY, 1, 0, Math.PI * 2);
        ctx.fill();
        ctx.beginPath();
        ctx.arc(px + 6, eyeY, 1, 0, Math.PI * 2);
        ctx.fill();
      }

      ctx.fillStyle = COLORS.chick.beak;
      ctx.beginPath();
      ctx.moveTo(px - 3, by + 1); ctx.lineTo(px, by + 7); ctx.lineTo(px + 3, by + 1);
      ctx.closePath();
      ctx.fill();

      ctx.fillStyle = COLORS.chick.body;
      ctx.beginPath();
      ctx.ellipse(px - 2, by - 16, 3, 5, -0.3, 0, Math.PI * 2);
      ctx.fill();
      ctx.beginPath();
      ctx.ellipse(px + 2, by - 17, 2, 4, 0.3, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();
    }

    drawSliding(px, py, ghost = false) {
      if (!ghost) {
        ctx.fillStyle = 'rgba(0,0,0,0.15)';
        ctx.beginPath();
        ctx.ellipse(px, py + 1, 18, 5, 0, 0, Math.PI * 2);
        ctx.fill();
      }

      ctx.fillStyle = COLORS.chick.body;
      ctx.beginPath();
      ctx.ellipse(px, py - 8, 18, 8, 0, 0, Math.PI * 2);
      ctx.fill();

      ctx.fillStyle = COLORS.chick.bodyDark;
      ctx.beginPath();
      ctx.ellipse(px + 3, py - 5, 12, 5, 0, 0, Math.PI * 2);
      ctx.fill();

      ctx.fillStyle = '#FFFFFF';
      ctx.beginPath();
      ctx.ellipse(px + 10, py - 12, 4, 4, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = COLORS.chick.eye;
      ctx.beginPath();
      ctx.arc(px + 11, py - 11, 2, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#FFFFFF';
      ctx.beginPath();
      ctx.arc(px + 12, py - 12, 0.8, 0, Math.PI * 2);
      ctx.fill();

      ctx.fillStyle = COLORS.chick.beak;
      ctx.beginPath();
      ctx.moveTo(px + 14, py - 10); ctx.lineTo(px + 20, py - 8); ctx.lineTo(px + 14, py - 7);
      ctx.closePath();
      ctx.fill();

      ctx.fillStyle = COLORS.chick.feet;
      ctx.beginPath();
      ctx.ellipse(px - 12, py - 3, 5, 2, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.beginPath();
      ctx.ellipse(px - 6, py - 3, 5, 2, 0, 0, Math.PI * 2);
      ctx.fill();

      ctx.strokeStyle = 'rgba(255,255,255,0.4)';
      ctx.lineWidth = 1;
      for (let i = 0; i < 3; i++) {
        const ly = py - 6 + i * 4;
        const lx = px - 25 - i * 5;
        ctx.beginPath();
        ctx.moveTo(lx, ly); ctx.lineTo(lx - 15, ly);
        ctx.stroke();
      }
    }
  }

  // ============================================================
  // OBSTACLES (with new combo patterns)
  // ============================================================

  class Obstacle {
    constructor(x, type) {
      this.x = x;
      this.type = type; // 'rock' | 'branch' | 'doublerock'
      this.passed = false;
      this.scored = false;
      if (this.type === 'rock') {
        this.width = 30; this.height = 28; this.y = GROUND_Y - this.height;
      } else if (this.type === 'doublerock') {
        this.width = 30; this.height = 28; this.y = GROUND_Y - this.height;
        this.secondX = x + 52;
      } else {
        this.width = 45; this.height = 16; this.y = GROUND_Y - 42;
      }
    }

    get hitbox() {
      const pad = 5;
      if (this.type === 'rock' || this.type === 'doublerock') {
        return { x: this.x - this.width / 2 + pad, y: this.y + pad, w: this.width - pad * 2, h: this.height - pad };
      }
      return { x: this.x - this.width / 2 + pad, y: this.y + pad, w: this.width - pad * 2, h: this.height - pad * 2 };
    }
    get hitbox2() {
      if (this.type !== 'doublerock') return null;
      const pad = 5;
      return { x: this.secondX - this.width / 2 + pad, y: this.y + pad, w: this.width - pad * 2, h: this.height - pad };
    }

    update() { this.x -= gameSpeed; if (this.secondX !== undefined) this.secondX -= gameSpeed; }
    get offscreen() {
      const last = this.secondX !== undefined ? Math.max(this.x, this.secondX) : this.x;
      return last < -60;
    }

    draw() {
      if (this.type === 'rock' || this.type === 'doublerock') {
        this.drawRock(this.x);
        if (this.secondX !== undefined) this.drawRock(this.secondX);
      } else {
        this.drawBranch();
      }
    }

    drawRock(rxOverride) {
      const rx = rxOverride !== undefined ? rxOverride : this.x;
      const ry = this.y, rw = this.width, rh = this.height;
      ctx.fillStyle = 'rgba(0,0,0,0.1)';
      ctx.beginPath();
      ctx.ellipse(rx, GROUND_Y + 1, rw / 2 + 3, 4, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = COLORS.rock;
      ctx.beginPath();
      ctx.moveTo(rx - rw / 2, GROUND_Y);
      ctx.lineTo(rx - rw / 2 + 3, ry + rh * 0.3);
      ctx.quadraticCurveTo(rx - rw / 4, ry, rx, ry - 3);
      ctx.quadraticCurveTo(rx + rw / 4, ry, rx + rw / 2 - 2, ry + rh * 0.35);
      ctx.lineTo(rx + rw / 2, GROUND_Y);
      ctx.closePath();
      ctx.fill();
      ctx.fillStyle = COLORS.rockLight;
      ctx.beginPath();
      ctx.ellipse(rx - 3, ry + 6, 5, 4, -0.3, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = COLORS.rockDark;
      ctx.beginPath();
      ctx.ellipse(rx + 5, ry + 10, 4, 3, 0.3, 0, Math.PI * 2);
      ctx.fill();
    }

    drawBranch() {
      const bx = this.x, by = this.y, bw = this.width, bh = this.height;
      ctx.strokeStyle = COLORS.branch;
      ctx.lineWidth = 4;
      ctx.beginPath();
      ctx.moveTo(bx - bw / 2 + 2, by + bh); ctx.lineTo(bx - bw / 2 + 2, GROUND_Y);
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(bx + bw / 2 - 2, by + bh); ctx.lineTo(bx + bw / 2 - 2, GROUND_Y);
      ctx.stroke();
      ctx.fillStyle = COLORS.branch;
      ctx.beginPath();
      ctx.roundRect(bx - bw / 2, by, bw, bh, 4);
      ctx.fill();
      ctx.fillStyle = COLORS.branchLight;
      ctx.fillRect(bx - bw / 2 + 3, by + 2, bw - 6, 3);
      ctx.fillStyle = palette().grass;
      ctx.beginPath();
      ctx.ellipse(bx - 5, by - 2, 6, 4, -0.5, 0, Math.PI * 2);
      ctx.fill();
      ctx.beginPath();
      ctx.ellipse(bx + 8, by - 1, 5, 3, 0.5, 0, Math.PI * 2);
      ctx.fill();
    }
  }

  let obstacles = [];

  function spawnObstacle() {
    const minGap = Math.max(120, 240 - distance / 80);
    if (obstacles.length === 0 || (GAME_WIDTH - Math.max(obstacles[obstacles.length - 1].x, obstacles[obstacles.length - 1].secondX || 0)) > minGap + Math.random() * 140) {
      const r = Math.random();
      let type;
      if (phase >= 3 && r < 0.25) type = 'doublerock';
      else if (phase >= 2 && r < 0.45) type = 'branch';
      else type = 'rock';
      // late game combo: rock then branch
      if (phase >= 3 && r > 0.7 && Math.random() < 0.3) type = 'branch';
      obstacles.push(new Obstacle(GAME_WIDTH + 50, type));
    }
  }

  // ============================================================
  // COLLECTIBLES
  // ============================================================

  class Collectible {
    constructor(x, y) {
      this.x = x; this.y = y;
      this.width = 18; this.height = 14;
      this.collected = false;
      this.bobOffset = Math.random() * Math.PI * 2;
      this.sparkleTimer = 0;
    }
    get hitbox() {
      return { x: this.x - this.width / 2, y: this.y - this.height / 2, w: this.width, h: this.height };
    }
    update() {
      this.x -= gameSpeed;
      this.bobOffset += 0.08;
      this.sparkleTimer++;
      if (player && player.magnetTimer > 0 && player.alive) {
        const dx = player.x - this.x, dy = (player.y - 16) - this.y;
        const d = Math.hypot(dx, dy);
        if (d < 150 && d > 0.01) { this.x += (dx / d) * 6; this.y += (dy / d) * 6; }
      }
    }
    draw() {
      if (this.collected) return;
      const bx = this.x;
      const by = this.y + Math.sin(this.bobOffset) * 3;
      ctx.fillStyle = feverActive ? `hsla(${(frameCount * 6) % 360},90%,70%,0.4)` : 'rgba(255,180,220,0.3)';
      ctx.beginPath();
      ctx.arc(bx, by, 12, 0, Math.PI * 2);
      ctx.fill();
      const wiggle = Math.sin(this.bobOffset * 2) * 3;
      ctx.strokeStyle = COLORS.worm;
      ctx.lineWidth = 5;
      ctx.lineCap = 'round';
      ctx.beginPath();
      ctx.moveTo(bx - 8, by + 2);
      ctx.quadraticCurveTo(bx - 2, by + wiggle, bx + 4, by);
      ctx.stroke();
      ctx.fillStyle = COLORS.worm;
      ctx.beginPath();
      ctx.arc(bx + 6, by - 1, 4, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = COLORS.wormLight;
      ctx.beginPath();
      ctx.arc(bx + 5, by - 2, 1.5, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#2D1B00';
      ctx.beginPath();
      ctx.arc(bx + 8, by - 2, 1, 0, Math.PI * 2);
      ctx.fill();
      if (this.sparkleTimer % 30 < 5) {
        ctx.fillStyle = 'rgba(255,255,200,0.8)';
        drawStar(bx + 10, by - 6, 3, 2, 4);
      }
    }
  }

  let collectibles = [];

  function spawnCollectible() {
    const minGap = 120;
    if (collectibles.length === 0 || (GAME_WIDTH - collectibles[collectibles.length - 1].x) > minGap + Math.random() * 100) {
      const y = GROUND_Y - 15 - Math.random() * 40;
      collectibles.push(new Collectible(GAME_WIDTH + 50, y));
    }
  }

  function drawStar(cx, cy, outerR, innerR, points) {
    ctx.beginPath();
    for (let i = 0; i < points * 2; i++) {
      const r = i % 2 === 0 ? outerR : innerR;
      const angle = (i * Math.PI) / points - Math.PI / 2;
      const x = cx + Math.cos(angle) * r;
      const y = cy + Math.sin(angle) * r;
      if (i === 0) ctx.moveTo(x, y);
      else ctx.lineTo(x, y);
    }
    ctx.closePath();
    ctx.fill();
  }

  // ============================================================
  // POWER-UPS (자석 / 실드)
  // ============================================================

  class PowerUp {
    constructor(x, y, type) {
      this.x = x; this.y = y; this.type = type; this.r = 14;
      this.collected = false; this.bob = Math.random() * Math.PI * 2;
    }
    get hitbox() { return { x: this.x - this.r, y: this.y - this.r, w: this.r * 2, h: this.r * 2 }; }
    update() { this.x -= gameSpeed; this.bob += 0.1; }
    draw() {
      if (this.collected) return;
      const bx = this.x, by = this.y + Math.sin(this.bob) * 4;
      ctx.save();
      ctx.globalAlpha = 0.25 + Math.sin(this.bob) * 0.1;
      ctx.fillStyle = this.type === 'magnet' ? '#E8443A' : '#5BB8FF';
      ctx.beginPath(); ctx.arc(bx, by, this.r + 6, 0, Math.PI * 2); ctx.fill();
      ctx.restore();
      ctx.fillStyle = '#FFFFFF';
      ctx.beginPath(); ctx.arc(bx, by, this.r, 0, Math.PI * 2); ctx.fill();
      if (this.type === 'magnet') {
        ctx.strokeStyle = '#E8443A'; ctx.lineWidth = 5;
        ctx.beginPath(); ctx.arc(bx, by + 1, 7, Math.PI, Math.PI * 2, false); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(bx - 7, by + 1); ctx.lineTo(bx - 7, by + 7); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(bx + 7, by + 1); ctx.lineTo(bx + 7, by + 7); ctx.stroke();
        ctx.strokeStyle = '#DDDDDD'; ctx.lineWidth = 5;
        ctx.beginPath(); ctx.moveTo(bx - 7, by + 6); ctx.lineTo(bx - 7, by + 9); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(bx + 7, by + 6); ctx.lineTo(bx + 7, by + 9); ctx.stroke();
      } else {
        ctx.fillStyle = '#5BB8FF';
        ctx.beginPath();
        ctx.moveTo(bx, by - 8); ctx.lineTo(bx + 7, by - 4); ctx.lineTo(bx + 7, by + 3);
        ctx.quadraticCurveTo(bx, by + 9, bx - 7, by + 3); ctx.lineTo(bx - 7, by - 4);
        ctx.closePath(); ctx.fill();
        ctx.strokeStyle = '#FFFFFF'; ctx.lineWidth = 2;
        ctx.beginPath(); ctx.moveTo(bx - 3, by); ctx.lineTo(bx - 1, by + 3); ctx.lineTo(bx + 4, by - 3); ctx.stroke();
      }
    }
  }

  function spawnPowerUp() {
    const y = GROUND_Y - 30 - Math.random() * 50;
    const type = Math.random() < 0.5 ? 'magnet' : 'shield';
    powerups.push(new PowerUp(GAME_WIDTH + 50, y, type));
  }

  // ============================================================
  // PARTICLES (juiced)
  // ============================================================

  class DustParticle {
    constructor(x, y, vx, vy) {
      this.x = x; this.y = y; this.vx = vx; this.vy = vy;
      this.life = 1;
      this.decay = 0.02 + Math.random() * 0.03;
      this.size = 2 + Math.random() * 3;
    }
    update() {
      this.x += this.vx; this.y += this.vy; this.vy += 0.05;
      this.life -= this.decay;
    }
    draw() {
      ctx.save();
      ctx.globalAlpha = this.life * 0.6;
      ctx.fillStyle = '#C4A55A';
      ctx.beginPath();
      ctx.arc(this.x, this.y, this.size * this.life, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();
    }
  }

  class ExplosionParticle {
    constructor(x, y, color) {
      this.x = x; this.y = y;
      const ang = Math.random() * Math.PI * 2;
      const spd = 2 + Math.random() * 6;
      this.vx = Math.cos(ang) * spd;
      this.vy = Math.sin(ang) * spd - 2;
      this.life = 1;
      this.decay = 0.015 + Math.random() * 0.02;
      this.size = 2 + Math.random() * 4;
      this.rot = Math.random() * Math.PI;
      this.rotSpd = (Math.random() - 0.5) * 0.4;
      this.color = color;
    }
    update() {
      this.x += this.vx; this.y += this.vy; this.vy += 0.18;
      this.vx *= 0.97; this.life -= this.decay; this.rot += this.rotSpd;
    }
    draw() {
      ctx.save();
      ctx.globalAlpha = Math.max(0, this.life);
      ctx.translate(this.x, this.y);
      ctx.rotate(this.rot);
      ctx.fillStyle = this.color;
      const s = this.size * Math.max(0.2, this.life);
      ctx.fillRect(-s / 2, -s / 2, s, s);
      ctx.restore();
    }
  }

  class SparkParticle {
    constructor(x, y, color) {
      this.x = x; this.y = y;
      const ang = Math.random() * Math.PI * 2;
      const spd = 1 + Math.random() * 4;
      this.vx = Math.cos(ang) * spd;
      this.vy = Math.sin(ang) * spd;
      this.life = 1;
      this.decay = 0.03 + Math.random() * 0.03;
      this.size = 1 + Math.random() * 2;
      this.color = color;
    }
    update() { this.x += this.vx; this.y += this.vy; this.vy += 0.05; this.life -= this.decay; }
    draw() {
      ctx.save();
      ctx.globalAlpha = Math.max(0, this.life);
      ctx.fillStyle = this.color;
      ctx.beginPath();
      ctx.arc(this.x, this.y, this.size * Math.max(0.2, this.life), 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();
    }
  }

  class CollectEffect {
    constructor(x, y, pointsText, isCombo) {
      this.x = x; this.y = y; this.life = 1; this.pointsText = pointsText; this.isCombo = isCombo;
      this.particles = [];
      const col = isCombo ? ['#FFD700', '#FF8C00', '#FF6B35'] : [COLORS.wormLight, '#FFFFFF', COLORS.worm];
      for (let i = 0; i < 10; i++) {
        const angle = (i / 10) * Math.PI * 2;
        this.particles.push({
          x: x, y: y,
          vx: Math.cos(angle) * (2 + Math.random() * 3),
          vy: Math.sin(angle) * (2 + Math.random() * 3),
          size: 2 + Math.random() * 2
        });
      }
    }
    update() {
      this.life -= 0.025;
      for (let p of this.particles) { p.x += p.vx; p.y += p.vy; p.vy -= 0.05; }
    }
    draw() {
      ctx.save();
      ctx.globalAlpha = this.life;
      for (let p of this.particles) {
        ctx.fillStyle = this.isCombo ? '#FFD700' : COLORS.wormLight;
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.size * this.life, 0, Math.PI * 2);
        ctx.fill();
      }
      ctx.fillStyle = this.isCombo ? '#FFD700' : COLORS.ui.score;
      ctx.font = this.isCombo ? 'bold 16px sans-serif' : 'bold 14px sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText(this.pointsText, this.x, this.y - 15 - (1 - this.life) * 25);
      ctx.restore();
    }
  }

  let explosionParticles = [];
  let sparkParticles = [];

  function spawnDust(x, y, count) {
    for (let i = 0; i < count; i++) {
      dustParticles.push(new DustParticle(
        x + (Math.random() - 0.5) * 10,
        y - Math.random() * 5,
        -Math.random() * 2 - 0.5,
        -Math.random() * 2
      ));
    }
  }
  function spawnExplosion(x, y) {
    const colors = ['#FFE14D', '#FF6B35', '#FF3B3B', '#FFFFFF', '#FF8C00'];
    for (let i = 0; i < 30; i++) {
      explosionParticles.push(new ExplosionParticle(x, y, colors[Math.floor(Math.random() * colors.length)]));
    }
    for (let i = 0; i < 15; i++) {
      sparkParticles.push(new SparkParticle(x, y, '#FFFFFF'));
    }
  }
  function spawnCollectBurst(x, y) {
    for (let i = 0; i < 8; i++) sparkParticles.push(new SparkParticle(x, y, COLORS.wormLight));
  }
  function triggerShake(amount, max) {
    screenShake = Math.max(screenShake, amount);
    screenShakeMax = Math.max(screenShakeMax, max);
  }
  function triggerFlash(color, alpha) {
    flashColor = color;
    flashAlpha = Math.max(flashAlpha, alpha);
  }

  // ============================================================
  // COLLISION DETECTION
  // ============================================================

  function checkCollision(a, b) {
    return a.x < b.x + b.w && a.x + a.w > b.x && a.y < b.y + b.h && a.y + a.h > b.y;
  }

  // 피격 처리: 피버/실드 i-frame이면 무시, 실드 있으면 흡수, 없으면 사망
  function handlePlayerHit() {
    if (!player.alive) return;
    if (feverActive || player.shieldIframe > 0) return;
    if (player.shield) {
      player.shield = false; player.shieldTimer = 0; player.shieldIframe = 45;
      triggerShake(9, 9); triggerFlash('91,184,255', 0.45);
      audio.shieldHit(); spawnCollectBurst(player.x, player.y - 16);
      comboCount = 0;
      return;
    }
    player.die();
  }

  function finalizeRun() {
    if (score > highScore) {
      highScore = score; isNewRecord = true;
      try { localStorage.setItem(HS_KEY, String(highScore)); } catch (e) {}
    }
  }

  // ============================================================
  // HUD & SCREENS
  // ============================================================

  function drawHUD() {
    ctx.save();
    // Score panel
    ctx.fillStyle = COLORS.ui.bg;
    ctx.beginPath();
    ctx.roundRect(10, 10, 200, 50, 10);
    ctx.fill();

    ctx.fillStyle = COLORS.ui.accent;
    ctx.font = 'bold 16px sans-serif';
    ctx.textAlign = 'left';
    ctx.fillText('🐛 점수', 22, 30);
    ctx.fillStyle = COLORS.ui.text;
    ctx.font = 'bold 18px sans-serif';
    ctx.fillText(score.toString(), 22, 50);

    ctx.fillStyle = COLORS.ui.accent;
    ctx.font = 'bold 16px sans-serif';
    ctx.fillText('📏 거리', 110, 30);
    ctx.fillStyle = COLORS.ui.text;
    ctx.font = 'bold 18px sans-serif';
    ctx.fillText(Math.floor(distance) + 'm', 110, 50);

    // Phase indicator
    ctx.fillStyle = COLORS.ui.bg;
    ctx.beginPath();
    ctx.roundRect(220, 10, 90, 50, 10);
    ctx.fill();
    ctx.fillStyle = COLORS.ui.accent;
    ctx.font = 'bold 14px sans-serif';
    ctx.fillText('PHASE', 232, 30);
    const phaseColors = ['#5DA832', '#FF8E5C', '#9B5CD8'];
    ctx.fillStyle = phaseColors[Math.min(phase - 1, 2)];
    ctx.font = 'bold 20px sans-serif';
    ctx.fillText(phase.toString(), 232, 50);

    // Combo meter
    if (comboCount > 1) {
      const cw = 140;
      ctx.fillStyle = COLORS.ui.bg;
      ctx.beginPath();
      ctx.roundRect(GAME_WIDTH - cw - 60, 10, cw, 50, 10);
      ctx.fill();
      ctx.fillStyle = '#FFD700';
      ctx.font = 'bold 20px sans-serif';
      ctx.textAlign = 'center';
      const pulse = 1 + Math.sin(frameCount * 0.3) * 0.08;
      ctx.save();
      ctx.translate(GAME_WIDTH - cw / 2 - 60, 40);
      ctx.scale(pulse, pulse);
      ctx.fillText('COMBO x' + comboCount, 0, 0);
      ctx.restore();
      // combo timer bar
      const barW = (cw - 20) * (comboTimer / COMBO_WINDOW);
      ctx.fillStyle = '#FF8C00';
      ctx.fillRect(GAME_WIDTH - cw - 50, 48, barW, 4);
    }

    // Fever meter / status
    const fmW = 180, fmX = GAME_WIDTH - fmW - 10, fmY = 70;
    ctx.fillStyle = COLORS.ui.bg;
    ctx.beginPath();
    ctx.roundRect(fmX, fmY, fmW, 22, 8);
    ctx.fill();
    if (feverActive) {
      const t = feverTimer / FEVER_DURATION;
      ctx.fillStyle = `hsl(${(frameCount * 6) % 360},90%,60%)`;
      ctx.beginPath();
      ctx.roundRect(fmX + 2, fmY + 2, (fmW - 4) * t, 18, 6);
      ctx.fill();
      ctx.fillStyle = '#FFFFFF';
      ctx.font = 'bold 13px sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText('🔥 FEVER!', fmX + fmW / 2, fmY + 15);
    } else {
      const t = feverMeter / 100;
      ctx.fillStyle = '#FF6B35';
      ctx.beginPath();
      ctx.roundRect(fmX + 2, fmY + 2, (fmW - 4) * t, 18, 6);
      ctx.fill();
      ctx.fillStyle = COLORS.ui.text;
      ctx.font = 'bold 11px sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText('FEVER 게이지 ' + Math.floor(feverMeter) + '%', fmX + fmW / 2, fmY + 15);
    }

    // Mute button (top right corner)
    const mbX = GAME_WIDTH - 44, mbY = 10;
    ctx.fillStyle = COLORS.ui.bg;
    ctx.beginPath();
    ctx.roundRect(mbX, mbY, 34, 34, 8);
    ctx.fill();
    ctx.font = '18px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText(audio.muted ? '🔇' : '🔊', mbX + 17, mbY + 24);

    // 파워업 잔여 타이머 아이콘 (좌측 점수판 아래)
    let puX = 28;
    if (player && player.magnetTimer > 0) { drawPowerIcon(puX, 82, '🧲', '#E8443A', player.magnetTimer / MAGNET_TIME); puX += 40; }
    if (player && player.shield) { drawPowerIcon(puX, 82, '🛡️', '#5BB8FF', player.shieldTimer / SHIELD_TIME); }

    ctx.restore();
  }

  function drawPowerIcon(x, y, emoji, color, ratio) {
    ctx.save();
    ctx.fillStyle = 'rgba(0,0,0,0.45)';
    ctx.beginPath(); ctx.arc(x, y, 15, 0, Math.PI * 2); ctx.fill();
    ctx.strokeStyle = color; ctx.lineWidth = 3;
    ctx.beginPath(); ctx.arc(x, y, 13, -Math.PI / 2, -Math.PI / 2 + Math.PI * 2 * Math.max(0, Math.min(1, ratio))); ctx.stroke();
    ctx.fillStyle = '#fff'; ctx.font = '14px sans-serif';
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText(emoji, x, y + 1);
    ctx.restore();
  }

  function getMuteBounds() {
    return { x: GAME_WIDTH - 44, y: 10, w: 34, h: 34 };
  }

  function drawMenuScreen() {
    ctx.fillStyle = 'rgba(0,0,0,0.4)';
    ctx.fillRect(0, 0, GAME_WIDTH, GAME_HEIGHT);
    const cx = GAME_WIDTH / 2;
    const cy = GAME_HEIGHT / 2 - 40;
    ctx.fillStyle = 'rgba(139,105,20,0.9)';
    ctx.beginPath();
    ctx.roundRect(cx - 180, cy - 80, 360, 230, 20);
    ctx.fill();
    ctx.strokeStyle = '#FFE14D';
    ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.roundRect(cx - 180, cy - 80, 360, 230, 20);
    ctx.stroke();

    ctx.fillStyle = COLORS.ui.accent;
    ctx.font = 'bold 36px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('🐣 흙속의 병아리', cx, cy - 30);
    ctx.fillStyle = COLORS.ui.text;
    ctx.font = 'bold 18px sans-serif';
    ctx.fillText('Dirt Chick Runner DX', cx, cy);
    ctx.fillStyle = '#FFD700';
    ctx.font = 'bold 13px sans-serif';
    ctx.fillText('🔥 콤보·피버·폭발 액션 강화판!', cx, cy + 22);

    const pulse = Math.sin(frameCount * 0.05) * 0.3 + 0.7;
    ctx.globalAlpha = pulse;
    ctx.fillStyle = COLORS.ui.accent;
    ctx.font = 'bold 20px sans-serif';
    ctx.fillText('터치하거나 스페이스를 눌러 시작!', cx, cy + 55);
    ctx.globalAlpha = 1;

    ctx.fillStyle = 'rgba(255,255,255,0.6)';
    ctx.font = '13px sans-serif';
    ctx.fillText('⬆/스페이스: 점프 (2단!) | ⬇: 슬라이드', cx, cy + 85);
    ctx.fillText('🧲 자석=지렁이 흡입 · 🛡️ 실드=1회 보호 · 🔊 우상단 음소거', cx, cy + 105);

    if (highScore > 0) {
      ctx.fillStyle = COLORS.ui.score;
      ctx.font = 'bold 16px sans-serif';
      ctx.fillText('🏆 최고 점수: ' + highScore, cx, cy + 132);
    }
  }

  function drawGameOverScreen() {
    ctx.fillStyle = 'rgba(0,0,0,0.5)';
    ctx.fillRect(0, 0, GAME_WIDTH, GAME_HEIGHT);
    const cx = GAME_WIDTH / 2;
    const cy = GAME_HEIGHT / 2 - 30;
    ctx.fillStyle = 'rgba(80,30,10,0.9)';
    ctx.beginPath();
    ctx.roundRect(cx - 160, cy - 70, 320, 220, 20);
    ctx.fill();
    ctx.strokeStyle = '#FF6B35';
    ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.roundRect(cx - 160, cy - 70, 320, 220, 20);
    ctx.stroke();

    ctx.fillStyle = '#FF6B35';
    ctx.font = 'bold 32px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('💀 꽝!', cx, cy - 25);

    ctx.fillStyle = COLORS.ui.text;
    ctx.font = 'bold 18px sans-serif';
    ctx.fillText('점수: ' + score, cx, cy + 15);
    ctx.fillText('거리: ' + Math.floor(distance) + 'm', cx, cy + 45);

    if (isNewRecord) {
      ctx.fillStyle = COLORS.ui.score;
      ctx.font = 'bold 16px sans-serif';
      ctx.fillText('🏆 새 최고 기록!', cx, cy + 72);
    } else {
      ctx.fillStyle = 'rgba(255,255,255,0.75)';
      ctx.font = 'bold 14px sans-serif';
      ctx.fillText('🏆 최고: ' + highScore, cx, cy + 72);
    }

    const pulse = Math.sin(frameCount * 0.05) * 0.3 + 0.7;
    ctx.globalAlpha = pulse;
    ctx.fillStyle = COLORS.ui.accent;
    ctx.font = 'bold 18px sans-serif';
    ctx.fillText('터치하거나 스페이스로 다시 시작!', cx, cy + 110);
    ctx.globalAlpha = 1;
  }

  // ============================================================
  // GAME LOGIC
  // ============================================================

  let player = null;

  function initGame() {
    player = new Player();
    obstacles = [];
    collectibles = [];
    dustParticles = [];
    collectEffects = [];
    explosionParticles = [];
    sparkParticles = [];
    gameSpeed = INITIAL_SPEED;
    distance = 0;
    score = 0;
    frameCount = 0;
    screenShake = 0;
    screenShakeMax = 0;
    flashAlpha = 0;
    hitStopTimer = 0;
    punchZoom = 1;
    feverActive = false;
    feverTimer = 0;
    feverMeter = 0;
    comboCount = 0;
    comboTimer = 0;
    phase = 1;
    powerups = [];
    isNewRecord = false;
    initBackground();
  }

  function startGame() {
    initGame();
    gameState = STATE.PLAYING;
  }

  function updateGame() {
    frameCount++;

    // difficulty phase by distance
    if (distance > 1500) phase = 3;
    else if (distance > 600) phase = 2;
    else phase = 1;

    // Speed: gradual ramp, steeper at higher phases
    const baseMax = feverActive ? MAX_SPEED + 2 : MAX_SPEED;
    const ramp = SPEED_RAMP();
    gameSpeed = Math.min(INITIAL_SPEED + ramp, baseMax);

    distance += gameSpeed * 0.05;

    // Hit-stop pauses simulation briefly on death
    if (hitStopTimer > 0) {
      hitStopTimer--;
      // still draw, don't update world
      audio.updateBgm();
      return;
    }

    updateBackground();
    player.update();

    if (feverActive) {
      player.invincible = true;
      feverTimer--;
      if (feverTimer <= 0) {
        feverActive = false;
        feverMeter = 0;
        player.invincible = false;
      }
    }

    // combo decay
    if (comboCount > 0) {
      comboTimer--;
      if (comboTimer <= 0) comboCount = 0;
    }

    // Spawn
    if (frameCount % 60 === 0 || Math.random() < 0.012 * (gameSpeed / INITIAL_SPEED)) spawnObstacle();
    if (Math.random() < 0.022) spawnCollectible();
    if (frameCount % 300 === 0 && Math.random() < 0.7) spawnPowerUp();

    // Obstacles
    for (let obs of obstacles) {
      obs.update();
      if (player.alive && checkCollision(player.hitbox, obs.hitbox)) {
        handlePlayerHit();
      } else if (obs.hitbox2 && player.alive && checkCollision(player.hitbox, obs.hitbox2)) {
        handlePlayerHit();
      }
      // 근접 회피 보너스 (점프로 아슬하게 스쳐 넘김)
      if (player.alive && !obs.scored && obs.x < player.x - 20) {
        obs.scored = true;
        const gap = obs.y - player.y;
        if (player.isJumping && gap >= 0 && gap <= 34) {
          score += 5;
          collectEffects.push(new CollectEffect(player.x, player.y - 40, '아슬! +5', false));
          feverMeter = Math.min(100, feverMeter + 3);
        }
      }
    }
    obstacles = obstacles.filter(o => !o.offscreen);

    // Collectibles
    for (let col of collectibles) {
      col.update();
      if (!col.collected && player.alive && checkCollision(player.hitbox, col.hitbox)) {
        col.collected = true;
        comboCount++;
        comboTimer = COMBO_WINDOW;
        const mult = Math.min(comboCount, 5);
        const gained = 10 * mult;
        score += gained;
        feverMeter = Math.min(100, feverMeter + 8);
        spawnCollectBurst(col.x, col.y);
        collectEffects.push(new CollectEffect(col.x, col.y, '+' + gained + (mult > 1 ? ' x' + mult : ''), mult > 1));
        triggerShake(3, 3);
        if (mult > 1) audio.combo(); else audio.collect();
        // enter fever
        if (!feverActive && feverMeter >= 100) {
          feverActive = true;
          feverTimer = FEVER_DURATION;
          triggerShake(10, 10);
          triggerFlash('255,215,0', 0.5);
          punchZoom = 1.06;
          audio.feverIn();
        }
      }
    }
    collectibles = collectibles.filter(c => c.x > -30 && !c.collected);

    // Power-ups
    for (let pu of powerups) {
      pu.update();
      if (!pu.collected && player.alive && checkCollision(player.hitbox, pu.hitbox)) {
        pu.collected = true;
        if (pu.type === 'magnet') player.magnetTimer = MAGNET_TIME;
        else { player.shield = true; player.shieldTimer = SHIELD_TIME; }
        collectEffects.push(new CollectEffect(pu.x, pu.y, pu.type === 'magnet' ? '🧲 자석!' : '🛡️ 실드!', true));
        triggerShake(4, 4);
        audio.power();
      }
    }
    powerups = powerups.filter(p => p.x > -40 && !p.collected);

    // Particles
    for (let p of dustParticles) p.update();
    dustParticles = dustParticles.filter(p => p.life > 0);
    for (let p of explosionParticles) p.update();
    explosionParticles = explosionParticles.filter(p => p.life > 0);
    for (let p of sparkParticles) p.update();
    sparkParticles = sparkParticles.filter(p => p.life > 0);
    for (let e of collectEffects) e.update();
    collectEffects = collectEffects.filter(e => e.life > 0);

    // shake / flash / zoom decay
    if (screenShake > 0) screenShake *= 0.85;
    if (screenShake < 0.5) screenShake = 0;
    if (flashAlpha > 0) flashAlpha -= 0.04;
    if (flashAlpha < 0) flashAlpha = 0;
    punchZoom += (1 - punchZoom) * 0.1;

    audio.updateBgm();
  }

  // speed ramp curve: gentle early, steep later
  function SPEED_RAMP() {
    const d = distance;
    // gentle linear-ish early, accelerating with phase
    const base = d * 0.0015;
    const accel = d > 600 ? (d - 600) * 0.0025 : 0;
    const accel2 = d > 1500 ? (d - 1500) * 0.004 : 0;
    return base + accel + accel2;
  }
  const SPEED_INCREMENT = 0.0003; // kept for reference

  function drawGame() {
    ctx.save();

    // Punch zoom from center
    if (punchZoom !== 1) {
      ctx.translate(GAME_WIDTH / 2, GAME_HEIGHT / 2);
      ctx.scale(punchZoom, punchZoom);
      ctx.translate(-GAME_WIDTH / 2, -GAME_HEIGHT / 2);
    }

    // Screen shake
    if (screenShake > 0) {
      ctx.translate(
        (Math.random() - 0.5) * screenShake,
        (Math.random() - 0.5) * screenShake
      );
    }

    ctx.clearRect(-20, -20, GAME_WIDTH + 40, GAME_HEIGHT + 40);

    drawBackground();

    for (let col of collectibles) col.draw();
    for (let pu of powerups) pu.draw();
    for (let obs of obstacles) obs.draw();
    player.draw();
    for (let p of dustParticles) p.draw();
    for (let p of explosionParticles) p.draw();
    for (let p of sparkParticles) p.draw();
    for (let e of collectEffects) e.draw();

    drawHUD();

    ctx.restore();

    // Flash overlay (outside transforms so it covers everything)
    if (flashAlpha > 0) {
      ctx.fillStyle = `rgba(${flashColor},${flashAlpha})`;
      ctx.fillRect(0, 0, GAME_WIDTH, GAME_HEIGHT);
    }

    // Vignette intensifies with speed/fever
    const vignette = Math.min(0.5, (gameSpeed - INITIAL_SPEED) / 16 + (feverActive ? 0.2 : 0));
    if (vignette > 0.05) {
      const grad = ctx.createRadialGradient(GAME_WIDTH / 2, GAME_HEIGHT / 2, 150, GAME_WIDTH / 2, GAME_HEIGHT / 2, 480);
      grad.addColorStop(0, 'rgba(0,0,0,0)');
      grad.addColorStop(1, `rgba(0,0,0,${vignette})`);
      ctx.fillStyle = grad;
      ctx.fillRect(0, 0, GAME_WIDTH, GAME_HEIGHT);
    }
  }

  // ============================================================
  // MAIN LOOP
  // ============================================================

  function gameLoop() {
    switch (gameState) {
      case STATE.MENU:
        frameCount++;
        updateBackground();
        ctx.clearRect(0, 0, GAME_WIDTH, GAME_HEIGHT);
        drawBackground();
        drawMenuScreen();
        break;

      case STATE.PLAYING:
        updateGame();
        drawGame();
        break;

      case STATE.GAMEOVER:
        frameCount++;
        gameSpeed *= 0.98;
        updateBackground();
        drawGame();
        drawGameOverScreen();
        break;
    }

    requestAnimationFrame(gameLoop);
  }

  // ============================================================
  // INPUT HANDLING
  // ============================================================

  let touchStartY = 0;
  let touchHandled = false;

  function inputPos(clientX, clientY) {
    const rect = canvas.getBoundingClientRect();
    return {
      x: (clientX - rect.left) / rect.width * GAME_WIDTH,
      y: (clientY - rect.top) / rect.height * GAME_HEIGHT
    };
  }

  function maybeToggleMute(x, y) {
    const b = getMuteBounds();
    if (x >= b.x && x <= b.x + b.w && y >= b.y && y <= b.y + b.h) {
      audio.toggleMute();
      return true;
    }
    return false;
  }

  canvas.addEventListener('touchstart', (e) => {
    e.preventDefault();
    audio.init(); audio.resume();
    const t = e.touches[0];
    const p = inputPos(t.clientX, t.clientY);
    if (maybeToggleMute(p.x, p.y)) return;
    touchStartY = t.clientY;
    touchHandled = false;
    handleInput();
  }, { passive: false });

  canvas.addEventListener('touchmove', (e) => {
    e.preventDefault();
    const dy = e.touches[0].clientY - touchStartY;
    if (Math.abs(dy) > 30 && !touchHandled) {
      touchHandled = true;
      if (dy > 0) {
        if (gameState === STATE.PLAYING && player) player.slide();
      }
    }
  }, { passive: false });

  canvas.addEventListener('touchend', (e) => { e.preventDefault(); }, { passive: false });

  canvas.addEventListener('mousedown', (e) => {
    e.preventDefault();
    audio.init(); audio.resume();
    const p = inputPos(e.clientX, e.clientY);
    if (maybeToggleMute(p.x, p.y)) return;
    handleInput();
  });

  const keys = {};
  document.addEventListener('keydown', (e) => {
    if (e.repeat) return;
    keys[e.code] = true;
    if (e.code === 'Space' || e.code === 'ArrowUp') {
      e.preventDefault();
      audio.init(); audio.resume();
      handleInput('jump');
    }
    if (e.code === 'ArrowDown') {
      e.preventDefault();
      audio.resume();
      handleInput('slide');
    }
    if (e.code === 'KeyM') {
      audio.toggleMute();
    }
  });
  document.addEventListener('keyup', (e) => { keys[e.code] = false; });

  function handleInput(action) {
    switch (gameState) {
      case STATE.MENU: startGame(); break;
      case STATE.PLAYING:
        if (player && player.alive) {
          if (action === 'slide') player.slide();
          else player.jump();
        }
        break;
      case STATE.GAMEOVER: startGame(); break;
    }
  }

  // ============================================================
  // INIT & START
  // ============================================================

  initGame();
  gameLoop();
  </script>
